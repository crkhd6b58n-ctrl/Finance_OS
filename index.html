<!-- Modo standalone en iOS — para que al agregarlo a la pantalla de inicio
     abra como app, sin la barra de Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ivan Finance">
<meta name="theme-color" content="#081a0e">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--s1:#0e0e1c;--s2:#151525;--s3:#1c1c30;
  --border:#252540;--border2:#353555;
  --text:#eeeef8;--muted:#7777aa;
  --accent:#d4ff47;--urgent:#ff4d6d;
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;position:fixed;inset:0;width:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;height:100%;width:100%;}
.topbar{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:calc(14px + env(safe-area-inset-top,0)) 18px 14px;border-bottom:1px solid var(--border);}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.topbar-title span{color:var(--accent);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 40px;}

.hero{background:linear-gradient(160deg,var(--s2),var(--s1));border:1px solid var(--border);border-radius:22px;padding:26px 22px;text-align:center;}
.hero-label{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.hero-amount{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;letter-spacing:-1px;cursor:pointer;line-height:1;}
.hero-amount.neg{color:var(--urgent);}
.hero-amount.pos{color:var(--accent);}
.hero-edit-hint{font-size:9.5px;color:var(--muted);margin-top:10px;}
.hero-today{font-size:11px;color:var(--muted);margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.hero-today b{color:var(--text);}

.btnrow{display:flex;gap:10px;margin-top:16px;}
.bigbtn{flex:1;padding:18px 10px;border-radius:16px;border:none;font-family:'DM Mono',monospace;font-weight:500;font-size:13.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .1s;}
.bigbtn:active{transform:scale(.96);}
.bigbtn.gasto{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.35);color:var(--urgent);}
.bigbtn.ingreso{background:rgba(212,255,71,.1);border:1px solid rgba(212,255,71,.3);color:var(--accent);}
.bigbtn .ic{font-size:22px;}

.sec-lbl{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
.log-item:last-child{border-bottom:none;}
.log-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
.log-desc{font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-time{font-size:9.5px;color:var(--muted);}
.log-amt{font-size:13px;font-weight:600;white-space:nowrap;}
.log-amt.out{color:var(--urgent);}
.log-amt.in{color:var(--accent);}
.log-del{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.empty{font-size:11.5px;color:var(--muted);text-align:center;padding:20px 0;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.overlay.on{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.flbl{font-size:10px;color:var(--muted);display:block;margin-bottom:6px;}
.finp{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:11px;padding:13px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;}
.finp.big{font-size:26px;font-weight:600;text-align:center;}
.finp:focus{outline:none;border-color:var(--border2);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.mbtn{flex:1;padding:14px;border-radius:12px;border:none;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;}
.mbtn.cancel{background:var(--s3);color:var(--muted);}
.mbtn.save{background:var(--accent);color:#000;font-weight:700;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:30px;font-size:12px;opacity:0;pointer-events:none;transition:all .25s;z-index:200;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.tabbar{flex-shrink:0;display:flex;border-top:1px solid var(--border);background:rgba(14,14,28,.92);padding-bottom:env(safe-area-inset-bottom,0);}
.tabbtn{flex:1;padding:9px 1px calc(9px + env(safe-area-inset-bottom,0));display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;color:var(--muted);}
.tabbtn.on{color:var(--accent);}
.tabbtn .ti{font-size:16px;line-height:1;}
.tabbtn .tl{font-size:8.5px;letter-spacing:.2px;}

.dtotal{text-align:center;padding:6px 0 4px;}
.dtotal-label{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.dtotal-amt{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--urgent);}
.dcard{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:14px;padding:14px 16px;margin-top:10px;}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.dcard-name{font-size:13.5px;font-weight:600;}

function fmt(n){
  const neg=n<0;
  const v=Math.abs(Math.round(n)).toLocaleString('es-MX');
  return (neg?'-$':'$')+v;
}
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isToday(ts){
  return new Date(ts).toDateString()===new Date().toDateString();
}
function timeLabel(ts){
  return new Date(ts).toLocaleTimeString('es-MX',{hour:'numeric',minute:'2-digit'});
}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const t=new Date(dateStr+'T12:00');const n=new Date();
  return Math.ceil((t-n)/(1000*60*60*24));
}
function fmtDate(dateStr){
  if(!dateStr)return '';
  const d=new Date(dateStr+'T12:00');
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${meses[d.getMonth()]}`;
}

  if(!todayLog.length){
    h+=`<div class="empty">Nada registrado hoy todavía</div>`;
  }else{
    [...todayLog].reverse().forEach(l=>{
      const catLabel=l.cat?CATS.find(c=>c.id===l.cat)?.label:null;
      const acctInfo=l.acct?ACCOUNTS.find(a=>a.id===l.acct):null;
      const isCredit=acctInfo&&acctInfo.type==='credit';
      const metaBits=[timeLabel(l.ts)];
      if(catLabel&&l.desc)metaBits.push(catLabel);
      if(acctInfo)metaBits.push(isCredit?`💳 ${acctInfo.name} (no tocó tu Disponible)`:acctInfo.name);
      h+=`<div class="log-item">
        <div class="log-left">
          <div class="log-desc">${l.desc||(catLabel||(l.type==='gasto'?'Gasto':'Ingreso'))}</div>

// ─── Deudas — mismo criterio que ya nos funcionó: orden automático por
// tasa de interés + urgencia de fecha, cero configuración manual. ────────
function computeDebtPriority(){
  const active=debts.filter(d=>d.status!=='done');
  active.forEach(d=>{
    let urgency=0;
    if(d.dueDate){
      const days=daysUntil(d.dueDate);
      if(days<0)urgency=3; else if(days<=7)urgency=2; else if(days<=21)urgency=1;
    }
    d.urgency=urgency;
    d.score=(d.rate*100)+(urgency*6);
  });
  return [...active].sort((a,b)=>b.score-a.score);
}
function urgencyLabel(d){
  if(d.status==='auto')return null;
  if(d.urgency>=3)return {text:'⚠️ Vencida',color:'var(--urgent)'};
  if(d.urgency===2)return {text:'⏰ Vence esta semana',color:'var(--urgent)'};
  if(d.rate>=0.3)return {text:'🔥 Interés altísimo',color:'#ffc847'};
  if(d.rate>0)return {text:`${Math.round(d.rate*100)}% interés`,color:'var(--muted)'};
  if(d.urgency===1)return {text:'📅 Vence pronto',color:'#ffc847'};
  return {text:'Sin interés',color:'var(--muted)'};
}

    <div class="dtotal-amt">${fmt(total)}</div>

  // Saldo de referencia — lo que dice tu estado de cuenta real, a mano.
  // No lo calcula la app: es tu manera de comparar contra lo que la app
  // trae calculado, sin tener que subir ningún PDF.
  const creditCards=ACCOUNTS.filter(a=>a.type==='credit');
  h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;">💳 Saldo de referencia (tus tarjetas)</div>`;
  creditCards.forEach(a=>{
    const d=debts.find(x=>x.id===a.debtId);
    const computed=d?d.bal:0;
    const ref=cardRefs[a.id];
    const diff=ref?Math.abs(ref.balance-computed):null;
    const mismatch=diff!==null&&diff>1;
    h+=`<div class="dcard" style="border-left-color:${mismatch?'#ffc847':'var(--border2)'};">
      <div class="dcard-top">
        <div>
          <div class="dcard-name">${a.name}</div>
          <div class="dcard-tag">App calcula: ${fmt(computed)}${ref?` · Tu estado de cuenta: ${fmt(ref.balance)} (${fmtDate(ref.updated)})`:' · sin referencia todavía'}</div>
        </div>
      </div>
      ${mismatch?`<div class="bnote" style="color:#ffc847;">⚠️ No cuadran — diferencia de ${fmt(diff)}</div>`:''}
      <button class="dcard-pay" onclick="openCardRef('${a.id}')">✏️ ${ref?'Actualizar':'Agregar'} saldo real</button>
    </div>`;
  });

  h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 2px;">Prioridad de ataque</div>`;
  ranked.forEach((d,i)=>{
    const tag=urgencyLabel(d);
    h+=`<div class="dcard" style="border-left-color:${d.status==='auto'?'var(--border2)':'var(--accent)'};">
      <div class="dcard-top">
        <div>
          <div class="dcard-name">${d.status!=='auto'?`<span class="dcard-rank">${i+1}</span>`:''}${d.n}</div>
          <div class="dcard-tag">${d.status==='auto'?'🔒 Automático — nómina lo paga solo':(tag?`<span style="color:${tag.color};">${tag.text}</span>`:'')}${d.dueDate&&d.status!=='auto'?` · ${fmtDate(d.dueDate)}`:''}</div>
        </div>
        <div class="dcard-bal">${fmt(d.bal)}</div>
      </div>
      ${d.status!=='auto'?`<button class="dcard-pay" onclick="openPayDebt('${d.id}')">+ Registrar pago</button>`:''}
    </div>`;
  });

  document.getElementById('app').innerHTML=h;
}

function weekOf(dateStr){
  const d=new Date(dateStr+'T12:00');
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function weeklySpendByCat(){
  const wk=weekOf(todayKey());
  const spend={};
  log.forEach(l=>{
    if(l.type!=='gasto'||!l.cat)return;
    if(weekOf(l.ts.slice(0,10))!==wk)return;
    spend[l.cat]=(spend[l.cat]||0)+l.amt;
  });
  return spend;
}

// ─── Presupuesto — mismas categorías con las que ya registras el gasto en
// Hoy. Deuda y Metas ya no son números fijos: se calculan en vivo desde
// Semana, así que esto deja de sentirse desconectado de tu ingreso real.
function renderPresupuesto(){
  const spend=weeklySpendByCat();
  const plan=computeWeeklyPlan();
  const cats=CATS.map(c=>({...c,cap:catCap(c)}));
  const totalSpent=cats.reduce((a,c)=>a+(spend[c.id]||0),0);
  const totalCap=cats.reduce((a,c)=>a+(c.cap||0),0);
  const freeLeft=plan.income-totalSpent;

  let h=`<div class="dtotal">
    <div class="dtotal-label">Ingreso de esta semana</div>
    <div class="dtotal-amt" style="color:var(--accent);font-size:28px;">${fmt(plan.income)}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px;">Gastado: ${fmt(totalSpent)} de ${fmt(totalCap)} presupuestado</div>
    <div style="font-size:13px;font-weight:600;margin-top:6px;color:${freeLeft>=0?'var(--accent)':'var(--urgent)'};">Libre: ${fmt(freeLeft)}</div>
  </div>`;

  cats.forEach(c=>{
    const sp=spend[c.id]||0;
    if(!c.cap){
      h+=`<div class="bwrap"><div class="blbl"><span>${c.label}</span><b>${fmt(sp)}</b></div></div>`;
      return;
    }
    const pct=Math.min(100,Math.round(sp/c.cap*100));
    const over=sp>c.cap;
    // En gasto normal, pasarte es malo (rojo). En Deuda/Metas, pasarte es
    // ir adelantado — abonaste o ahorraste más de lo mínimo (verde).
    const goodOverspend=over&&c.dynamic;
    const color=over?(goodOverspend?'var(--accent)':'var(--urgent)'):pct>=70?'#ffc847':'var(--accent)';
    h+=`<div class="bwrap">
      <div class="blbl"><span>${c.label}${c.dynamic?' <span style="opacity:.6;">· de Semana</span>':''}</span><span>${fmt(sp)} / ${fmt(c.cap)}</span></div>
      <div class="bbg"><div class="bfill" style="width:${pct}%;background:${color};"></div></div>
      ${over?(goodOverspend?`<div class="bnote" style="color:var(--accent);">✓ Vas adelantado ${fmt(sp-c.cap)}</div>`:`<div class="bnote">Te pasaste ${fmt(sp-c.cap)}</div>`):''}
    </div>`;
  });

  h+=`<div style="font-size:9.5px;color:var(--muted);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">Deuda y Metas se llenan solas cuando marcas cosas en Semana ✓ — no hace falta capturarlas aquí también.</div>`;

  document.getElementById('app').innerHTML=h;
}

let payDebtId=null;

// ─── MSI — compras a meses sin intereses. Un tap al mes cuando veas el
// cargo reflejado en tu tarjeta, y ya: baja el saldo y se resta de tu
// Disponible junto. Puedes agregar compras nuevas tú mismo, sin pedírmelo.
function renderMSI(){
  const active=msiList.filter(m=>(m.total-m.paid)>0.5);
  const total=active.reduce((a,m)=>a+(m.total-m.paid),0);

  let h=`<div class="dtotal">
    <div class="dtotal-label">MSI pendiente</div>
    <div class="dtotal-amt" style="color:var(--accent);">${fmt(total)}</div>
  </div>
  <div style="font-size:9.5px;color:var(--muted);margin-top:6px;text-align:center;">Las que están en una tarjeta (Nu, BBVA) ya cuentan dentro del saldo de esa tarjeta en Deudas y Semana — aquí solo llevas cuántos pagos les faltan.</div>`;

  if(!active.length){
    h+=`<div class="empty">No tienes MSI activos</div>`;
  }
  active.sort((a,b)=>(a.total-a.paid)-(b.total-b.paid)).forEach(m=>{
    const remaining=m.total-m.paid;
    const monthsLeft=Math.max(1,Math.ceil(remaining/m.monthly));
    const linkedCard=ACCOUNTS.find(a=>a.type==='credit'&&a.cutoffDay&&a.name.toLowerCase()===String(m.card||'').toLowerCase());
    h+=`<div class="dcard">
      <div class="dcard-top">
        <div>
          <div class="dcard-name">${m.name}</div>
          <div class="dcard-tag">${m.card} · corte día ${m.cutoffDay} · ${monthsLeft} pago${monthsLeft!==1?'s':''} más</div>
        </div>
        <div class="dcard-bal">${fmt(remaining)}</div>
      </div>
      ${linkedCard?`<button class="dcard-pay" onclick="confirmMSIPayment('${m.id}')">✓ Marcar mes ${Math.round(m.paid/m.monthly)+1} confirmado (no toca tu Disponible)</button>`
                  :`<button class="dcard-pay" onclick="confirmMSIPayment('${m.id}')">✓ Confirmar pago de este mes — ${fmt(Math.min(m.monthly,remaining))}</button>`}
    </div>`;
  });

  h+=`<button class="addbtn" onclick="openAddMSI()">+ Agregar compra a meses</button>`;

function confirmMSIPayment(id){
  const m=msiList.find(x=>x.id===id);if(!m)return;
  const amt=Math.min(m.monthly,m.total-m.paid);
  const linkedCard=ACCOUNTS.find(a=>a.type==='credit'&&a.cutoffDay&&a.name.toLowerCase()===String(m.card||'').toLowerCase());
  m.paid+=amt;
  if(linkedCard){
    // Ya está contado en el saldo de la tarjeta — esto es solo llevar la
    // cuenta de cuántos meses van, no un cobro nuevo.
    save();render();
    toast(`${m.name} — mes confirmado ✓ (ya estaba en el saldo de ${m.card})`);
    return;
  }
  balance.amount-=amt;
  balance.updated=todayKey();
  log.push({id:Date.now().toString(),type:'gasto',amt,desc:`MSI ${m.name}`,cat:'otros',ts:new Date().toISOString()});
  save();render();
  toast(`Pago de ${m.name} confirmado ✓`);
}

// ─── Plan — el panorama completo: todo lo que ya sabíamos (deudas con
// fecha, fondo de ahorro) más lo nuevo (viaje, aguinaldo, navidad), en una
// sola línea de tiempo. Los montos que todavía no sabes quedan como "por
// definir" — no se inventa un número para que la cuenta cuadre.
function monthLabel(dateStr){
  const d=new Date(dateStr+'T12:00');
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${meses[d.getMonth()]} ${d.getFullYear()}`;
}

function renderPlan(){
  const timeline=[];
  planItems.forEach(p=>{
    const saved=p.saved||0;
    const remaining=p.amount!==null?Math.max(0,p.amount-saved):null;
    timeline.push({name:p.name,icon:p.icon,type:p.type,amount:p.amount,remaining,saved,date:p.date,note:p.note,pending:p.amount===null,id:p.id});
  });
  timeline.sort((a,b)=>{
    if(!a.date&&!b.date)return 0;
    if(!a.date)return 1;
    if(!b.date)return -1;
    return a.date.localeCompare(b.date);
  });

  // Usa lo que falta (no el monto original) para que el panorama se
  // actualice solo conforme vas apartando dinero desde Semana.
  const knownIncome=timeline.filter(t=>t.type==='income'&&t.amount!==null).reduce((a,t)=>a+t.amount,0);
  const knownExpense=timeline.filter(t=>t.type==='expense'&&t.amount!==null).reduce((a,t)=>a+(t.remaining!==null?t.remaining:t.amount),0);
  const totalSaved=timeline.reduce((a,t)=>a+(t.saved||0),0);
  const pendingCount=timeline.filter(t=>t.pending).length;

  let h=`<div class="dtotal">
    <div class="dtotal-label">Panorama de compromisos (no deuda)</div>
    <div class="dtotal-amt" style="color:${knownIncome-knownExpense>=0?'var(--accent)':'var(--urgent)'};font-size:28px;">${fmt(knownIncome-knownExpense)}</div>
    <div style="font-size:10.5px;color:var(--muted);margin-top:4px;">${fmt(knownIncome)} conocido en ingresos − ${fmt(knownExpense)} en cumpleaños/navidad/viaje${pendingCount?` · ${pendingCount} por definir`:''}</div>
    ${totalSaved>0?`<div style="font-size:11px;color:var(--accent);margin-top:6px;">✓ Ya llevas ${fmt(totalSaved)} apartado entre todo</div>`:''}
  </div>`;

  // Progreso visual por deuda — de un vistazo, cómo va bajando cada una.
  // Ordenado por prioridad (igual que Deudas), no alfabético.
  h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;">💳 Progreso de deudas</div>`;
  const allDebtsForProgress=[...computeDebtPriority(),...debts.filter(d=>d.status==='done')];
  allDebtsForProgress.forEach(d=>{
    const orig=d.orig||d.bal||1;
    const pct=Math.min(100,Math.round((orig-d.bal)/orig*100));
    const done=d.status==='done'||d.bal<=0;
    h+=`<div class="dcard" style="border-left-color:${done?'var(--accent)':'var(--urgent)'};">
      <div class="dcard-top">
        <div>
          <div class="dcard-name">${d.n}${done?' ✅':''}</div>
          <div class="dcard-tag">${done?'Liquidada':`${fmt(d.bal)} de ${fmt(orig)}`}${d.rate?` · ${Math.round(d.rate*100)}% interés`:''}</div>
        </div>
        <div class="dcard-bal" style="color:${done?'var(--accent)':'var(--text)'};">${pct}%</div>
      </div>
      <div class="bwrap" style="margin-top:8px;">
        <div class="bbg"><div class="bfill" style="width:${pct}%;background:${done?'var(--accent)':pct>=50?'#ffc847':'var(--urgent)'};"></div></div>
      </div>
    </div>`;
  });

  // Agrupa por mes — así ves en cuál vas a necesitar liberar más dinero,
  // no solo una lista plana. Un renglón "saldo acumulado" te dice cómo
  // vas quedando si sigues el plan mes a mes.
  const withDate=timeline.filter(t=>t.date);
  const noDate=timeline.filter(t=>!t.date);
  const months={};
  withDate.forEach(t=>{
    const mk=t.date.slice(0,7);
    if(!months[mk])months[mk]=[];
    months[mk].push(t);
  });
  const monthKeys=Object.keys(months).sort();

  let running=0;
  monthKeys.forEach(mk=>{
    const items=months[mk];
    const monthIncome=items.filter(t=>t.type==='income'&&t.amount!==null).reduce((a,t)=>a+t.amount,0);
    const monthExpense=items.filter(t=>t.type==='expense'&&t.amount!==null).reduce((a,t)=>a+(t.remaining!==null?t.remaining:t.amount),0);
    running+=monthIncome-monthExpense;
    const isPast=daysUntil(mk+'-28')<-28;

    h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 0 2px;display:flex;justify-content:space-between;">
      <span>${monthLabel(mk+'-01')}${isPast?' · pasó':''}</span>
      <span style="color:${running>=0?'var(--accent)':'var(--urgent)'};">acumulado ${fmt(running)}</span>
    </div>`;
    if(monthExpense>0||monthIncome>0){
      h+=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px;">Este mes: ${monthIncome>0?`+${fmt(monthIncome)} · `:''}${monthExpense>0?`−${fmt(monthExpense)} por liberar`:'nada que liberar'}</div>`;
    }

    items.forEach(t=>{
      const days=daysUntil(t.date);
      const urgent=days!==null&&days>=0&&days<=14;
      const pct=t.amount?Math.min(100,Math.round((t.saved||0)/t.amount*100)):0;
      h+=`<div class="dcard" style="border-left-color:${t.type==='income'?'var(--accent)':t.pending?'var(--border2)':'var(--urgent)'};">
        <div class="dcard-top">
          <div>
            <div class="dcard-name">${t.icon} ${t.name}</div>
            <div class="dcard-tag" style="${urgent?'color:var(--urgent);':''}">${fmtDate(t.date)}${days!==null&&days>=0?` · en ${days} día${days!==1?'s':''}`:''} · ${t.note}</div>
          </div>
          <div class="dcard-bal" style="color:${t.type==='income'?'var(--accent)':'var(--text)'};">${t.amount!==null?(t.type==='income'?'+':'')+fmt(t.amount):'Por definir'}</div>
        </div>
        ${t.saved>0&&t.amount?`<div class="bwrap" style="margin:9px 0 0;">
          <div class="blbl"><span>Llevas ${fmt(t.saved)}</span><span>${pct}%</span></div>
          <div class="bbg"><div class="bfill" style="width:${pct}%;background:var(--accent);"></div></div>
        </div>`:''}
        ${t.id?`<button class="dcard-pay" onclick="openPlanItem('${t.id}')">✏️ Editar</button>`:''}
      </div>`;
    });
  });

  if(noDate.length){
    h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 0 2px;">Sin fecha aún</div>`;
    noDate.forEach(t=>{
      h+=`<div class="dcard" style="border-left-color:var(--border2);">
        <div class="dcard-top">
          <div><div class="dcard-name">${t.icon} ${t.name}</div><div class="dcard-tag">${t.note}</div></div>
          <div class="dcard-bal">${t.amount!==null?fmt(t.amount):'Por definir'}</div>
        </div>
        ${t.id?`<button class="dcard-pay" onclick="openPlanItem('${t.id}')">✏️ Editar</button>`:''}
      </div>`;
    });
  }

  h+=`<button class="addbtn" onclick="openPlanItem(null)">+ Agregar algo al plan</button>`;

  document.getElementById('app').innerHTML=h;
}

// ─── Marcar una línea de Semana como hecha aplica el efecto real, según
// qué es — sin que tengas que ir a otra pestaña a capturarlo dos veces:
//  · Digitt / MSI → se aparta (gasto real, resta Disponible)
//  · Mínimo de deuda → además abona a esa deuda de verdad
//  · Meta con fecha (cumpleaños, etc.) → además suma a lo ahorrado del plan
// Desmarcar revierte exactamente lo mismo que se aplicó.
function toggleWeekCheck(key){
  const p=computeWeeklyPlan();
  const wkStart=p.wkStart;
  if(!weekChecks[wkStart])weekChecks[wkStart]={};
  const existing=weekChecks[wkStart][key];

  if(existing&&existing.done){
    log=log.filter(l=>l.id!==existing.logId);
    balance.amount+=existing.amt;
    if(existing.extra&&existing.extra.type==='debtpay'){
      const d=debts.find(x=>x.id===existing.extra.debtId);
      if(d)d.bal+=existing.amt;
    }else if(existing.extra&&existing.extra.type==='plansave'){
      const pl=planItems.find(x=>x.id===existing.extra.planId);
      if(pl)pl.saved=Math.max(0,(pl.saved||0)-existing.amt);
    }else if(existing.extra&&existing.extra.type==='msipay'){
      existing.extra.items.forEach(it=>{
        const m=msiList.find(x=>x.id===it.id);
        if(m)m.paid=Math.max(0,m.paid-it.amount);
      });
    }
    delete weekChecks[wkStart][key];
    balance.updated=todayKey();
    save();renderSemana();
    toast('Desmarcado — revertido');
    return;
  }

  let amt=0,desc='',cat='deuda',extra=null;
  if(key==='digitt'){
    amt=p.digittWeekly;desc='Apartado para Digitt';
  }else if(key.startsWith('msi_')){
    const id=key.slice(4);
    const m=p.msiThisWeek.find(x=>x.id===id);if(!m)return;
    amt=m.amount;desc=`Pago de ${m.name}`;
    extra={type:'msipay',items:m.items?m.items:[{id:m.id,amount:m.amount}]};
  }else if(key.startsWith('sub_')){
    const id=key.slice(4);
    const s=p.subsThisWeek.find(x=>x.id===id);if(!s)return;
    amt=s.amount;desc=`Pago de ${s.name}`;cat='otros';
  }else if(key.startsWith('debtmin_')){
    const id=key.slice(8);
    const d=p.otherMins.find(x=>x.id===id);if(!d)return;
    amt=d.weekly;desc=`Pago a ${d.name}`;
    extra={type:'debtpay',debtId:id};
  }else if(key.startsWith('plan_')){
    const id=key.slice(5);
    const c=p.datedCommitments.find(x=>x.id===id);if(!c)return;
    amt=c.weekly;desc=`Apartado para ${c.name}`;cat='metas';
    extra={type:'plansave',planId:id};
  }else return;

  if(amt<=0)return;
  const logId=Date.now().toString();
  log.push({id:logId,type:'gasto',amt,desc,cat,acct:'debito',ts:new Date().toISOString()});
  balance.amount-=amt;
  balance.updated=todayKey();

  if(extra&&extra.type==='debtpay'){
    const d=debts.find(x=>x.id===extra.debtId);
    if(d)d.bal=Math.max(0,d.bal-amt);
  }else if(extra&&extra.type==='plansave'){
    const pl=planItems.find(x=>x.id===extra.planId);
    if(pl)pl.saved=(pl.saved||0)+amt;
  }else if(extra&&extra.type==='msipay'){
    extra.items.forEach(it=>{
      const m=msiList.find(x=>x.id===it.id);
      if(m)m.paid+=it.amount;
    });
  }

  weekChecks[wkStart][key]={done:true,logId,amt,extra};
  save();renderSemana();
  toast('Marcado ✓');
}

// ─── El motor de la semana — junta TODO lo que ya sabe la app (deudas,
// fechas de cumpleaños/navidad/viaje, presupuesto) y contesta la pregunta
// real: de mi ingreso de esta semana, ¿cuánto es necesario, cuánto hay que
// ir apartando para lo que se acerca, y cuánto me queda para decidir yo?
// Nada se manda solo a ningún lado — esto es información para que decidas.
function computeWeeklyPlan(){
  const income=INCOME[weekType];
  const wkStart=weekOf(todayKey());
  const wkEndDate=new Date(wkStart+'T12:00');wkEndDate.setDate(wkEndDate.getDate()+6);
  const wkEnd=wkEndDate.toISOString().slice(0,10);

  // Encuentra si un "día del mes" (cobro recurrente) cae dentro de esta
  // semana, y si no, calcula la próxima fecha real en que va a caer —
  // así "esta semana" y "próximo" quedan separados de verdad, no todo
  // mezclado como una fracción semanal de todo.
  function dateThisWeekOrNext(day){
    if(!day)return {inWeek:false,nextDate:null};
    for(let i=0;i<7;i++){
      const d=new Date(wkStart+'T12:00');d.setDate(d.getDate()+i);
      if(d.getDate()===day)return {inWeek:true,nextDate:d.toISOString().slice(0,10)};
    }
    let probe=new Date(todayKey()+'T12:00');
    for(let i=0;i<40;i++){
      if(probe.getDate()===day&&probe>=new Date(todayKey()+'T12:00'))return {inWeek:false,nextDate:probe.toISOString().slice(0,10)};
      probe.setDate(probe.getDate()+1);
    }
    return {inWeek:false,nextDate:null};
  }
  // Para deudas con fecha (como Digitt), cuántas semanas faltan a la
  // PRÓXIMA fecha real. Si la fecha guardada todavía no pasa, se usa TAL
  // CUAL (respeta mes y año, no solo el día) — si ya pasó (dato viejo sin
  // actualizar), ahí sí se asume que se repite cada mes en ese mismo día,
  // como un corte de tarjeta, y busca la próxima ocurrencia.
  function weeksUntilNextMonthly(dateStr){
    if(!dateStr)return null;
    const today=new Date(todayKey()+'T12:00');
    const exact=new Date(dateStr+'T12:00');
    if(exact>=today){
      const days=Math.ceil((exact-today)/(1000*60*60*24));
      return {days,weeks:Math.max(1,days/7),date:dateStr};
    }
    const day=exact.getDate();
    let probe=new Date(today);
    for(let i=0;i<40;i++){
      if(probe.getDate()===day&&probe>=today){
        const days=Math.ceil((probe-today)/(1000*60*60*24));
        return {days,weeks:Math.max(1,days/7),date:probe.toISOString().slice(0,10)};
      }
      probe.setDate(probe.getDate()+1);
    }
    return null;
  }

  // 1. Necesidades fijas de la semana (gas, comida, café) — de Presupuesto
  const necessities=CATS.reduce((a,c)=>a+(c.cap||0),0);

  // 2. Digitt — pago mensual real, ya comprometido, no es negociable — de Deudas
  const digitt=debts.find(d=>d.id==='digitt');
  const digittWeekly=digitt&&digitt.status!=='done'?digitt.monthlyTarget/4.33:0;

  // 3. MSI activos — los que están ligados a una tarjeta real (Nu, BBVA)
  // YA están incluidos en el saldo total de esa tarjeta (debts.bal), así
  // que NO se cuentan aparte aquí — eso era el doble conteo que traíamos.
  // Se quedan solo como referencia, pegados a la fila de esa tarjeta más
  // abajo. Lo que no es de ninguna tarjeta real (el préstamo de Mercado
  // Pago) sí es su propio compromiso semanal, porque no vive en ningún
  // "saldo de tarjeta" — de MSI.
  const msiActive=msiList.filter(m=>(m.total-m.paid)>0.5);
  const msiThisWeek=[],msiUpcoming=[];
  const cardMsiRef={}; // {acctId: [{name,amount,monthsLeft}]}
  msiActive.forEach(m=>{
    const acct=ACCOUNTS.find(a=>a.type==='credit'&&a.cutoffDay&&a.name.toLowerCase()===String(m.card||'').toLowerCase());
    const remaining=m.total-m.paid;
    const monthsLeft=Math.max(1,Math.ceil(remaining/m.monthly));
    if(acct){
      if(!cardMsiRef[acct.id])cardMsiRef[acct.id]=[];
      cardMsiRef[acct.id].push({name:m.name,monthsLeft});
    }else{
      const amt=Math.min(m.monthly,remaining);
      const {inWeek,nextDate}=dateThisWeekOrNext(m.cutoffDay);
      if(inWeek)msiThisWeek.push({id:m.id,name:m.name,amount:amt,date:nextDate});
      else msiUpcoming.push({id:m.id,name:m.name,amount:amt,date:nextDate,day:m.cutoffDay});
    }
  });
  const msiThisWeekTotal=msiThisWeek.reduce((a,m)=>a+m.amount,0);

  // 4. Deudas activas (avalancha) — el "bolsillo" semanal de cada tarjeta o
  // préstamo: se reparte entre las semanas que faltan a su PRÓXIMA fecha
  // real (corte, vencimiento), igual que Digitt. Cada vez que marcas esta
  // línea en Semana, se abona de verdad a esa deuda — así el saldo mismo
  // ES tu progreso, no hay un número de "aportado" aparte que cuadrar.
  const priority=computeDebtPriority();
  const otherDebts=priority.filter(d=>d.id!=='digitt'&&d.id!=='banorte'&&d.id!=='familiar');
  const otherMins=otherDebts.filter(d=>d.bal>0).map(d=>{
    const isReal=!!d.monthlyTarget;
    const suggestedMonthly=d.monthlyTarget||Math.max(d.bal*0.08,200);
    const next=weeksUntilNextMonthly(d.dueDate);
    const weeks=next?next.weeks:4.33;
    return {id:d.id,name:d.n,weekly:suggestedMonthly/weeks,bal:d.bal,nextDate:next?next.date:null,msiRef:cardMsiRef[d.id]||null,target:suggestedMonthly,weeksLeft:weeks,isReal};
  });
  const otherMinsTotal=otherMins.reduce((a,d)=>a+d.weekly,0);

  // 4b. Suscripciones — mismo criterio que MSI: si cobra esta semana, cuenta
  // completo aquí; si no, va a "Próximo" nomás como referencia — de Suscripciones
  const subsThisWeek=[],subsUpcoming=[];
  subs.forEach(s=>{
    const {inWeek,nextDate}=dateThisWeekOrNext(s.day);
    if(inWeek)subsThisWeek.push({id:s.id,name:s.name,amount:s.amount,date:nextDate,note:s.note});
    else subsUpcoming.push({id:s.id,name:s.name,amount:s.amount,date:nextDate,day:s.day,note:s.note});
  });
  const subsThisWeekTotal=subsThisWeek.reduce((a,s)=>a+s.amount,0);

  const fixedTotal=necessities+digittWeekly+msiThisWeekTotal+otherMinsTotal+subsThisWeekTotal;

  // 5. Apartando para lo que se acerca — cumpleaños, navidad, viaje — de
  // Plan. Esto NO es un pago de esta semana puntual, es el pedacito que
  // vas guardando cada semana para llegar completo a la fecha. El préstamo
  // familiar ($54,100) se excluye a propósito: lo cubre el fondo de ahorro
  // de enero, no tu ingreso semana a semana.
  const datedCommitments=planItems.filter(p=>p.type==='expense'&&p.amount&&p.date&&daysUntil(p.date)>=0)
    .map(p=>{
      const wksLeft=Math.max(1,daysUntil(p.date)/7);
      const remaining=Math.max(0,p.amount-(p.saved||0));
      return {id:p.id,name:p.name,weekly:remaining/wksLeft,date:p.date,remaining};
    }).sort((a,b)=>a.date.localeCompare(b.date));
  const datedTotal=datedCommitments.reduce((a,c)=>a+c.weekly,0);

  // 6. Próximo — todo lo que no cae esta semana, junto y ordenado por
  // fecha, para que veas lo que viene sin que compita con tu disponible hoy.
  const upcoming=[...msiUpcoming.map(m=>({...m,type:'MSI'})),...subsUpcoming.map(s=>({...s,type:'Suscripción'}))]
    .filter(u=>u.date).sort((a,b)=>a.date.localeCompare(b.date));

  const committed=fixedTotal+datedTotal;
  const surplus=income-committed;

  const topDebt=priority.find(d=>d.id!=='banorte'&&d.bal>0);

  return {income,wkStart,wkEnd,necessities,digittWeekly,msiThisWeek,msiThisWeekTotal,otherMins,otherMinsTotal,subsThisWeek,subsThisWeekTotal,upcoming,fixedTotal,datedCommitments,datedTotal,committed,surplus,topDebt};
}

let msiDetailOpen={};
function toggleMsiDetail(key){
  msiDetailOpen[key]=!msiDetailOpen[key];
  renderSemana();
}
function checkRow(wkStart,key,icon,name,sub,weekly,items){
  const st=weekChecks[wkStart]&&weekChecks[wkStart][key];
  const done=st&&st.done;
  const hasDetail=items&&items.length>1;
  const open=msiDetailOpen[key];
  let h=`<div class="crow ${done?'done':''}" onclick="toggleWeekCheck('${key}')">
    <div class="cbox">✓</div>
    <div class="crow-mid"><span class="srow-l">${icon} ${name}</span><div class="srow-sub">${sub}</div></div>
    <div class="crow-amt">${fmt(weekly)}</div>
  </div>`;
  if(hasDetail){
    h+=`<div style="padding-left:31px;">
      <button onclick="event.stopPropagation();toggleMsiDetail('${key}')" style="font-size:9.5px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 0 6px;font-family:'DM Mono',monospace;">${open?'▲ ocultar detalle':`▼ ver detalle (${items.length})`}</button>
      ${open?`<div style="padding-bottom:6px;">${items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);padding:3px 0;"><span>${it.name}</span><span>${fmt(it.amount)}</span></div>`).join('')}</div>`:''}
    </div>`;
  }
  return h;
}

function renderSemana(){
  const p=computeWeeklyPlan();

  let h=`<div class="dtotal">
    <div class="dtotal-label">Ingreso de esta semana</div>
    <div class="dtotal-amt" style="color:var(--accent);">${fmt(p.income)}</div>
    <div style="font-size:10.5px;color:var(--muted);margin-top:4px;">${fmtDate(p.wkStart)}–${fmtDate(p.wkEnd)} · Semana ${weekType==='full'?'completa':'con descuento de Banorte'}</div>
  </div>
  <button class="wktoggle" onclick="toggleWeekType()">¿Me equivoqué? Esta semana es ${weekType==='full'?'con descuento':'completa'} →</button>`;

  h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 0 2px;">Fijo esta semana</div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">Necesidades se llena sola con lo que registras en Hoy. Lo demás, márcalo cuando ya lo hayas apartado o pagado — se aplica solo.</div>
  <div class="dcard">
    <div class="srow"><span class="srow-l">🍔 Necesidades (gas, comida, café)<div class="srow-sub">Presupuesto</div></span><span class="srow-r">${fmt(p.necessities)}</span></div>
    ${p.digittWeekly?checkRow(p.wkStart,'digitt','💳','Digitt','Ahorro semanal · Deudas',p.digittWeekly):''}
    ${p.msiThisWeek.map(m=>checkRow(p.wkStart,`msi_${m.id}`,'🗓️',m.name,`Corte ${fmtDate(m.date)} · MSI`,m.amount,m.items)).join('')}
    ${p.subsThisWeek.map(s=>checkRow(p.wkStart,`sub_${s.id}`,'🔁',s.name,`Se cobra ${fmtDate(s.date)} · Suscripciones`,s.amount)).join('')}
    ${p.otherMins.map(d=>{
      const msiNote=d.msiRef&&d.msiRef.length?` · incluye ${d.msiRef.map(r=>`${r.name} (${r.monthsLeft}m)`).join(', ')}`:'';
      const weeksTxt=d.weeksLeft?d.weeksLeft.toFixed(1):'4.3';
      const formula=`${fmt(d.target)} entre ${weeksTxt} sem. hasta ${d.nextDate?fmtDate(d.nextDate):'—'}${d.isReal?'':' (estimado, sin dato real)'}`;
      return checkRow(p.wkStart,`debtmin_${d.id}`,'💳',`${d.name} (bolsillo)`,formula+msiNote,d.weekly);
    }).join('')}
  </div>`;

  if(p.datedCommitments.length){
    h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 2px;">Apartando para lo que se acerca</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">No son pagos de esta semana — es el pedacito que vas guardando cada semana para llegar completo a la fecha. De Plan.</div>
    <div class="dcard">
      ${p.datedCommitments.map(c=>{
        const days=daysUntil(c.date);
        return checkRow(p.wkStart,`plan_${c.id}`,'🎯',c.name,`${fmtDate(c.date)} · en ${days}d · quedan ${fmt(c.remaining)}`,c.weekly);
      }).join('')}
    </div>`;
  }

  if(p.upcoming.length){
    h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 2px;">Próximo</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">Todavía no toca — no resta de tu disponible de esta semana, es solo para que lo veas venir.</div>
    <div class="dcard">
      ${p.upcoming.map(u=>{
        const days=daysUntil(u.date);
        return `<div class="srow"><span class="srow-l">${u.type==='MSI'?'🗓️':'🔁'} ${u.name}<div class="srow-sub">${fmtDate(u.date)} · en ${days}d · ${u.type}</div></span><span class="srow-r" style="color:var(--muted);">${fmt(u.amount)}</span></div>`;
      }).join('')}
    </div>`;
  }

  const surplusColor=p.surplus>=0?'var(--accent)':'var(--urgent)';
  h+=`<div class="surplus-card">
    <div style="font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Disponible para decidir</div>
    <div class="surplus-amt" style="color:${surplusColor};">${fmt(p.surplus)}</div>
    <div style="font-size:10.5px;color:var(--muted);margin-top:8px;">Después de lo fijo y lo apartado, esto es tuyo — cafés, salidas, novia, amigos, o meterle extra a una deuda.</div>
  </div>`;

  if(p.surplus<0){
    h+=`<div class="callout" style="border-color:rgba(255,77,109,.35);background:rgba(255,77,109,.08);">
      ⚠️ Esta semana lo comprometido pesa más que el ingreso. No hay margen — hay que decidir qué se mueve (¿algún regalo se puede recorrer de fecha? ¿el mínimo de alguna deuda espera una semana?).
    </div>`;
  }else if(p.topDebt){
    const pct=p.topDebt.rate?Math.round(p.topDebt.rate*100)+'% interés':'sin interés';
    h+=`<div class="callout">
      💡 Si decides meterle extra a una deuda, la más óptima ahora es <b>${p.topDebt.n}</b> (${pct}) — es la que más caro te cuesta tener abierta.
    </div>`;
  }

  const soon=[...p.datedCommitments].filter(c=>daysUntil(c.date)<=21);
  if(soon.length){
    h+=`<div style="font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 2px;">Se acerca (≤21 días)</div>`;
    soon.forEach(c=>{
      const days=daysUntil(c.date);
      h+=`<div class="srow"><span class="srow-l">${fmtDate(c.date)} — ${c.name}</span><span class="srow-r" style="color:var(--urgent);">en ${days}d</span></div>`;
    });
  }

  document.getElementById('app').innerHTML=h;
}

// ─── Wishlist — cosas que quieres o necesitas comprarte, con semáforo de
// qué tan alcanzable es cada una AHORA MISMO, comparado contra tu dinero
// real: el disponible libre de esta semana (lo que no compromete nada) y
// tu disponible total (por si quieres usar algo que ya tenías apartado).
function wishAffordability(price){
  const liquid=balance.amount;
  const plan=computeWeeklyPlan();
  const surplus=Math.max(0,plan.surplus);
  if(price<=surplus)return {level:'now',label:'✅ Te alcanza esta semana, libre',color:'var(--accent)'};
  if(price<=liquid)return {level:'liquid',label:'🟡 Alcanza con tu disponible, pero no es 100% libre',color:'#ffc847'};
  const weeksNeeded=surplus>1?Math.ceil((price-liquid)/surplus):null;
  return {level:'wait',label:weeksNeeded?`⏳ ~${weeksNeeded} semana${weeksNeeded!==1?'s':''} ahorrando tu libre`:'⏳ Todavía no — sin excedente semanal',color:'var(--muted)'};
}
function renderWishlist(){
  const liquid=balance.amount;
  const plan=computeWeeklyPlan();
  const surplus=plan.surplus;

  let h=`<div class="dtotal">
    <div class="dtotal-label">Con qué comparamos</div>
    <div style="display:flex;justify-content:space-around;margin-top:8px;">
      <div><div style="font-size:9.5px;color:var(--muted);">Disponible ahora</div><div style="font-size:18px;font-weight:700;color:var(--accent);">${fmt(liquid)}</div></div>
      <div><div style="font-size:9.5px;color:var(--muted);">Libre esta semana</div><div style="font-size:18px;font-weight:700;color:${surplus>=0?'var(--accent)':'var(--urgent)'};">${fmt(surplus)}</div></div>
    </div>
  </div>`;

  if(!wishlist.length){
    h+=`<div class="empty" style="margin-top:16px;">Todavía no agregas nada — toca abajo para armar tu lista</div>`;
  }else{
    const sorted=[...wishlist].sort((a,b)=>a.price-b.price);
    sorted.forEach(w=>{
      const af=wishAffordability(w.price);
      h+=`<div class="dcard" style="border-left-color:${af.color};">
        <div class="dcard-top">
          <div>
            <div class="dcard-name">${w.emoji||'🛍️'} ${w.name}</div>
            <div class="dcard-tag">${w.note||''}</div>
          </div>
          <div class="dcard-bal">${fmt(w.price)}</div>
        </div>
        <div style="font-size:10.5px;color:${af.color};margin-top:8px;">${af.label}</div>
        <button class="dcard-pay" onclick="openWishItem('${w.id}')">✏️ Editar</button>
      </div>`;
    });
  }

  h+=`<button class="addbtn" onclick="openWishItem(null)">+ Agregar a la wishlist</button>`;

  document.getElementById('app').innerHTML=h;
}
function openWishItem(id){
  const w=id?wishlist.find(x=>x.id===id):null;
  document.getElementById('mtitle').textContent=w?'Editar':'Agregar a la wishlist';
  document.getElementById('mbody').innerHTML=`
    <input type="hidden" id="w-id" value="${id||''}">
    <div class="fg"><label class="flbl">¿Qué es?</label><input class="finp" id="w-name" type="text" placeholder="ej. Audífonos, tenis" maxlength="40" value="${w?w.name:''}" autofocus></div>
    <div class="fg"><label class="flbl">Emoji</label><input class="finp" id="w-emoji" type="text" placeholder="🛍️" maxlength="2" style="font-size:24px;text-align:center;" value="${w?w.emoji||'🛍️':'🛍️'}"></div>
    <div class="fg"><label class="flbl">Precio</label><input class="finp big" id="w-price" type="number" inputmode="decimal" placeholder="0" value="${w?w.price:''}"></div>
    <div class="fg"><label class="flbl">Nota (opcional)</label><input class="finp" id="w-note" type="text" placeholder="¿para qué, dónde lo viste?" maxlength="80" value="${w&&w.note?w.note:''}"></div>
    <div class="modal-actions">
      ${w?`<button class="mbtn cancel" onclick="delWishItem('${id}')" style="color:var(--urgent);">Eliminar</button>`:`<button class="mbtn cancel" onclick="closeModal()">Cancelar</button>`}
      <button class="mbtn save" onclick="saveWishItem()">Guardar</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('w-name').focus(),50);
}
function saveWishItem(){
  const id=document.getElementById('w-id').value;
  const name=document.getElementById('w-name').value.trim();
  const emoji=document.getElementById('w-emoji').value.trim()||'🛍️';
  const price=parseFloat(document.getElementById('w-price').value);
  const note=document.getElementById('w-note').value.trim();
  if(!name){toast('Ponle un nombre');return;}
  if(isNaN(price)||price<=0){toast('Ingresa un precio válido');return;}
  if(id){
    const w=wishlist.find(x=>x.id===id);
    if(w){w.name=name;w.emoji=emoji;w.price=price;w.note=note;}
  }else{
    wishlist.push({id:Date.now().toString(),name,emoji,price,note});
  }
  save();closeModal();render();
  toast('Guardado ✓');
}
function delWishItem(id){
  wishlist=wishlist.filter(x=>x.id!==id);
  save();closeModal();render();
  toast('Eliminado');
}

function openCardRef(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const ref=cardRefs[acctId];
  const d=debts.find(x=>x.id===a.debtId);
  document.getElementById('mtitle').textContent=`Actualizar — ${a.name}`;
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flbl">¿Cuánto dice tu estado de cuenta que debes en total?</label><input class="finp big" id="ref-bal" type="number" inputmode="decimal" value="${ref?ref.balance:(d?d.bal:'')}" placeholder="0"></div>
    <div class="fg"><label class="flbl">"Pago para no generar intereses" de este corte (el número real de tu app del banco, no lo adivinamos)</label><input class="finp" id="ref-target" type="number" inputmode="decimal" value="${d&&d.monthlyTarget?d.monthlyTarget:''}" placeholder="0"></div>
    <div class="fg"><label class="flbl">Fecha límite de pago de este corte</label><input class="finp" id="ref-due" type="date" value="${d&&d.dueDate?d.dueDate:''}"></div>
    <div class="modal-actions">
      <button class="mbtn cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn save" onclick="saveCardRef('${acctId}')">Guardar</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('ref-bal').focus(),50);
}
function saveCardRef(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const n=parseFloat(document.getElementById('ref-bal').value);
  if(isNaN(n)){toast('Ingresa un número válido');return;}
  cardRefs[acctId]={balance:n,updated:todayKey()};
  const targetRaw=document.getElementById('ref-target').value;
  const dueRaw=document.getElementById('ref-due').value;
  const d=debts.find(x=>x.id===a.debtId);
  if(d){
    if(targetRaw!=='')d.monthlyTarget=parseFloat(targetRaw);
    if(dueRaw)d.dueDate=dueRaw;
  }
  save();closeModal();renderDeudas();
  toast('Actualizado ✓ — Semana ya usa estos datos');
}

function openPayDebt(id){
  const d=debts.find(x=>x.id===id);if(!d)return;
  payDebtId=id;
  document.getElementById('mtitle').textContent=`Pago a ${d.n}`;
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flbl">¿Cuánto pagaste?</label><input class="finp big" id="pay-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>
    <div class="chk-row"><input type="checkbox" id="pay-fromliquid" checked><label for="pay-fromliquid">Restar también de tu Disponible ahora</label></div>
    <div class="modal-actions">
      <button class="mbtn cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn save" onclick="savePayDebt()">Registrar</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('pay-amt').focus(),50);
}
function savePayDebt(){
  const amt=parseFloat(document.getElementById('pay-amt').value);
  if(isNaN(amt)||amt<=0){toast('Ingresa un monto válido');return;}
  const fromLiquid=document.getElementById('pay-fromliquid').checked;
  const d=debts.find(x=>x.id===payDebtId);if(!d)return;
  d.bal=Math.max(0,d.bal-amt);
  if(fromLiquid){
    balance.amount-=amt;
    balance.updated=todayKey();
    log.push({id:Date.now().toString(),type:'gasto',amt,desc:`Pago a ${d.n}`,ts:new Date().toISOString()});
  }
  save();closeModal();render();
  toast(`Pago a ${d.n} registrado ✓`);
}

// ─── Editar el disponible directo (corrección manual, ej. primera vez o
// ajuste tras revisar el banco) ──────────────────────────────────────────
function editBalance(){
  document.getElementById('mtitle').textContent='Disponible ahora';
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><input class="finp big" id="bal-input" type="number" inputmode="decimal" value="${balance.amount}" autofocus></div>
    <div class="modal-actions">
      <button class="mbtn cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn save" onclick="saveBalance()">Guardar</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('bal-input').focus(),50);
}
function saveBalance(){
  const n=parseFloat(document.getElementById('bal-input').value);
  if(isNaN(n)){toast('Ingresa un número válido');return;}
  balance.amount=n;balance.updated=todayKey();
  save();closeModal();render();toast('Saldo actualizado ✓');
}

// ─── Registrar gasto o ingreso — 2 campos, nada más. El disponible se
// ajusta al instante, no hay que "sincronizar" nada después. ────────────
let moveType='gasto';
let selectedCat='otros';
let selectedAcct='debito';
function openMove(type){
  moveType=type;
  selectedCat='otros';
  selectedAcct='debito';
  document.getElementById('mtitle').textContent=type==='gasto'?'Nuevo gasto':'Nuevo ingreso';
  const catChips=type==='gasto'?`
    <div class="fg"><label class="flbl">Categoría</label>
      <div class="catchips" id="cat-chips">
        ${CATS.map(c=>`<div class="catchip ${c.id==='otros'?'on':''}" data-cat="${c.id}" onclick="pickCat('${c.id}')">${c.label}</div>`).join('')}
      </div>
    </div>`:'';
  const acctChips=type==='gasto'?`
    <div class="fg"><label class="flbl">¿Con qué pagaste?</label>
      <div class="catchips" id="acct-chips">
        ${ACCOUNTS.map(a=>`<div class="catchip ${a.id==='debito'?'on':''}" data-acct="${a.id}" onclick="pickAcct('${a.id}')">${a.name}${a.type==='credit'?' 💳':''}</div>`).join('')}
      </div>
    </div>`:'';
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flbl">Monto</label><input class="finp big" id="mv-amt" type="number" inputmode="decimal" placeholder="0" autofocus></div>
    ${catChips}
    ${acctChips}
    <div class="fg"><label class="flbl">¿En qué? (opcional)</label><input class="finp" id="mv-desc" type="text" placeholder="${type==='gasto'?'ej. Pemex, Soriana':'ej. nómina, venta'}" maxlength="40"></div>
    <div class="modal-actions">
      <button class="mbtn cancel" onclick="closeModal()">Cancelar</button>
      <button class="mbtn save" onclick="saveMove()">Registrar</button>
    </div>`;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>document.getElementById('mv-amt').focus(),50);
}
function pickCat(id){
  selectedCat=id;
  document.querySelectorAll('#cat-chips .catchip').forEach(el=>{
    el.classList.toggle('on',el.dataset.cat===id);
  });
}
function pickAcct(id){
  selectedAcct=id;
  document.querySelectorAll('#acct-chips .catchip').forEach(el=>{
    el.classList.toggle('on',el.dataset.acct===id);
  });
}
// Si pagaste con una tarjeta de crédito, el gasto NO sale de tu Disponible
// ahora — sube lo que debes en esa tarjeta (mismo dato que Deudas). Si es
// débito/efectivo/Revolut, sale directo de tu Disponible, como siempre.
function saveMove(){
  const amt=parseFloat(document.getElementById('mv-amt').value);
  if(isNaN(amt)||amt<=0){toast('Ingresa un monto válido');return;}
  const desc=document.getElementById('mv-desc').value.trim();
  const cat=moveType==='gasto'?selectedCat:null;
  const acct=moveType==='gasto'?selectedAcct:null;
  const acctInfo=acct?ACCOUNTS.find(a=>a.id===acct):null;

  log.push({id:Date.now().toString(),type:moveType,amt,desc,cat,acct,ts:new Date().toISOString()});

  if(moveType==='ingreso'){
    balance.amount+=amt;
  }else if(acctInfo&&acctInfo.type==='credit'){
    const d=debts.find(x=>x.id===acctInfo.debtId);
    if(d){d.bal+=amt;if(d.status==='done')d.status='active';}
  }else{
    balance.amount-=amt;
  }
  balance.updated=todayKey();
  save();closeModal();render();
  toast(moveType==='gasto'?'Gasto registrado ✓':'Ingreso registrado ✓');
}
function delMove(id){
  const l=log.find(x=>x.id===id);if(!l)return;
  const acctInfo=l.acct?ACCOUNTS.find(a=>a.id===l.acct):null;
  if(l.type==='ingreso'){
    balance.amount-=l.amt;
  }else if(acctInfo&&acctInfo.type==='credit'){
    const d=debts.find(x=>x.id===acctInfo.debtId);
    if(d)d.bal=Math.max(0,d.bal-l.amt);
  }else{
    balance.amount+=l.amt;
  }
  log=log.filter(x=>x.id!==id);
  save();render();toast('Eliminado — saldo corregido');
}

// ─── Exportar/Importar — como todo vive solo en este teléfono/navegador,
// cada vez que abras un archivo nuevo (una actualización) puede empezar de
// cero. Exporta antes de cambiar de versión, importa después, y no se
// pierde nada — saldo, gastos, deudas, lo que ya marcaste en Semana, todo.
const ALL_KEYS=[BK,LK,DK,MK,PK,WK,CK,SUBK,CRK,WLK];
function openDataModal(){
  document.getElementById('mtitle').textContent='Tus datos';
  document.getElementById('mbody').innerHTML=`
    <div class="fg"><label class="flbl">Exportar — copia este texto antes de abrir una versión nueva</label>
      <textarea class="finp" id="data-export" rows="4" readonly style="font-size:10px;height:90px;" onclick="this.select()"></textarea>
      <button class="mbtn save" style="margin-top:8px;width:100%;" onclick="copyExport()">Copiar</button>
    </div>
    <div class="fg" style="margin-top:18px;"><label class="flbl">Importar — pega aquí el texto que copiaste antes</label>
      <textarea class="finp" id="data-import" rows="4" placeholder="Pega tu respaldo aquí" style="font-size:10px;height:90px;"></textarea>
      <button class="mbtn save" style="margin-top:8px;width:100%;background:var(--s3);color:var(--accent);" onclick="doImport()">Restaurar estos datos</button>
    </div>
    <div class="modal-actions"><button class="mbtn cancel" onclick="closeModal()" style="width:100%;">Cerrar</button></div>
  `;
  const dump={};
  ALL_KEYS.forEach(k=>{dump[k]=localStorage.getItem(k);});
  document.getElementById('overlay').classList.add('on');
  document.getElementById('data-export').value=JSON.stringify(dump);
}
function copyExport(){
  const el=document.getElementById('data-export');
  el.select();
  try{document.execCommand('copy');toast('Copiado ✓ — pégalo en notas por si acaso');}
  catch{navigator.clipboard.writeText(el.value).then(()=>toast('Copiado ✓')).catch(()=>toast('No se pudo copiar, selecciona y copia a mano'));}
}
function doImport(){
  const raw=document.getElementById('data-import').value.trim();
  if(!raw){toast('Pega tu respaldo primero');return;}
  try{
    const dump=JSON.parse(raw);
    ALL_KEYS.forEach(k=>{
      if(dump[k]!==undefined&&dump[k]!==null)localStorage.setItem(k,dump[k]);
    });
    load();closeModal();render();
    toast('Datos restaurados ✓');
  }catch(e){
    toast('Ese texto no se pudo leer — revisa que sea el respaldo completo');
  }
}

function closeModal(){document.getElementById('overlay').classList.remove('on');}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2000);
}

load();switchTab('hoy');
</script>
