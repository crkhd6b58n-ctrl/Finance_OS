<style>
:root{
  --bg:#07070f;--s1:#0e0e1c;--s2:#151525;--s3:#1c1c30;
  --border:#252540;--border2:#353555;
  --text:#eeeef8;--muted:#7777aa;--muted2:#44445a;
  --accent:#d4ff47;--accent-dim:rgba(212,255,71,0.1);
  --urgent:#ff4d6d;--urgent-dim:rgba(255,77,109,0.12);
  --suggest:#ffc847;--suggest-dim:rgba(255,200,71,0.08);
  --milestone:#47ffaa;--milestone-dim:rgba(71,255,170,0.08);
  --couple:#ff8a65;--couple-dim:rgba(255,138,101,0.1);
  --info:#47b8ff;--info-dim:rgba(71,184,255,0.08);
  --purple:#c084fc;--purple-dim:rgba(192,132,252,0.08);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;-webkit-font-smoothing:antialiased;}

.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;}

.topbar{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-0.3px;}
.topbar-title span{color:var(--accent);}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--suggest-dim);border:1px solid rgba(255,200,71,.3);border-radius:20px;padding:4px 10px 4px 8px;font-size:10px;color:var(--suggest);font-weight:700;cursor:pointer;}
.streak-badge:active{transform:scale(.95);}
.topbar-right{display:flex;gap:6px;}
.tbtn{height:32px;width:32px;border:1px solid var(--border);background:var(--s2);color:var(--text);cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .12s;}
.tbtn:active{transform:scale(.92);}
.tbtn.primary{background:var(--accent);color:#000;border-color:var(--accent);}

.tabbar{flex-shrink:0;display:flex;border-top:1px solid var(--border);background:rgba(14,14,28,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom,0);position:relative;z-index:20;}
.tabbtn{flex:1;padding:8px 2px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;color:var(--muted2);transition:color .15s;}
.tabbtn.on{color:var(--accent);}
.tabbtn .ti{font-size:19px;line-height:1;transition:transform .15s;}
.tabbtn.on .ti{transform:translateY(-1px);}
.tabbtn .tl{font-size:9px;letter-spacing:.3px;font-weight:500;}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.view{padding:14px 14px 28px;display:none;}
.view.on{display:block;animation:viewin .22s ease both;}
@keyframes viewin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.subnav{display:flex;gap:6px;margin-bottom:14px;background:var(--s1);padding:4px;border-radius:12px;border:1px solid var(--border);}
.subnav-btn{flex:1;padding:8px 4px;text-align:center;font-size:10px;letter-spacing:.3px;color:var(--muted);background:transparent;border:none;border-radius:9px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:500;transition:all .15s;}
.subnav-btn.on{background:var(--s3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}

.eyebrow{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:500;}
.h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.3px;line-height:1.1;}
.h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-0.2px;}
.num-lg{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.num-md{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.3px;}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;}
.card.flat{background:transparent;border:none;padding:0;}
.card.hero{padding:18px;}
.card.tight{padding:11px 13px;margin-bottom:8px;}

.sec-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}

.row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(37,37,64,.5);font-size:12px;gap:10px;}
.row:last-child{border-bottom:none;}
.rl{color:var(--muted);flex:1;line-height:1.5;}
.rl strong{color:var(--text);font-weight:500;}
.rl .sub{display:block;font-size:10px;color:var(--muted2);margin-top:1px;line-height:1.4;}
.rv{white-space:nowrap;font-weight:600;font-size:12px;}
.neg{color:var(--urgent);}.pos{color:var(--accent);}
.c-suggest{color:var(--suggest);}.c-milestone{color:var(--milestone);}
.c-couple{color:var(--couple);}.c-info{color:var(--info);}.c-purple{color:var(--purple);}

.alert{padding:12px 13px;margin-bottom:10px;font-size:11.5px;line-height:1.7;display:flex;gap:9px;align-items:flex-start;border-radius:var(--r);}
.alert.urgent{background:var(--urgent-dim);border:1px solid rgba(255,77,109,.28);}
.alert.suggest{background:var(--suggest-dim);border:1px solid rgba(255,200,71,.28);}
.alert.milestone{background:var(--milestone-dim);border:1px solid rgba(71,255,170,.28);}
.alert.info{background:var(--info-dim);border:1px solid rgba(71,184,255,.25);}
.alert.couple{background:var(--couple-dim);border:1px solid rgba(255,138,101,.28);}
.alert.ok{background:var(--accent-dim);border:1px solid rgba(212,255,71,.25);}
.ai{font-size:16px;flex-shrink:0;margin-top:1px;}
.ab strong{color:var(--text);}

.hoy-hero{background:linear-gradient(160deg,var(--s1) 0%,var(--s2) 100%);border:1px solid var(--border);border-radius:18px;padding:20px 18px;margin-bottom:14px;}
.hoy-greeting{font-size:11px;color:var(--muted);margin-bottom:4px;}
.hoy-status-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
.hoy-balance-label{font-size:10px;color:var(--muted);margin-bottom:2px;}

.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.scenario-btn{padding:14px 10px;border:1px solid var(--border);background:var(--s2);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;cursor:pointer;text-align:left;transition:all .15s;position:relative;overflow:hidden;}
.scenario-btn:active{transform:scale(.97);}
.scenario-btn.active{border-color:var(--accent);background:var(--accent-dim);}
.scenario-btn.is-urgent{border-color:rgba(255,77,109,.4);}
.scenario-btn.is-urgent::after{content:'';position:absolute;top:8px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--urgent);box-shadow:0 0 0 0 rgba(255,77,109,.5);animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(255,77,109,.5);}70%{box-shadow:0 0 0 6px rgba(255,77,109,0);}100%{box-shadow:0 0 0 0 rgba(255,77,109,0);}}
.scenario-icon{font-size:20px;display:block;margin-bottom:6px;}
.scenario-title{font-size:11.5px;font-weight:500;line-height:1.3;}
.scenario-sub{font-size:9.5px;color:var(--muted);margin-top:2px;}

.step-list{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.step-hdr{padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:600;}
.step{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-bottom:1px solid rgba(37,37,64,.5);}
.step:last-child{border-bottom:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{flex:1;}
.step-title{font-size:12.5px;color:var(--text);font-weight:500;margin-bottom:2px;}
.step-amount{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--accent);margin:2px 0;}
.step-note{font-size:10.5px;color:var(--muted);line-height:1.5;}
.copy-btn{font-size:9.5px;padding:5px 10px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;margin-top:6px;display:inline-flex;align-items:center;gap:4px;}
.copy-btn:active{color:var(--accent);border-color:var(--accent);transform:scale(.96);}

.bar-wrap{margin:9px 0;}
.bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}

.wk-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;scrollbar-width:none;}
.wk-nav::-webkit-scrollbar{display:none;}

// ─── Categories ───────────────────────────────────────────────────────────
const CATS=[

const ACCOUNTS=[

// ─── Budget limits per category — auto-suggested from trailing spend ───────
// null means "not yet calculated"; computeBudgetLimits() fills these in from
// real transaction history the first time enough data exists.
let BUDGET_LIMITS={}; // {catId: suggestedMonthlyLimit}

const DEBTS_INIT=[
  {id:'plata',  n:'Plata Card',    bal:1984.50,orig:2000,  st:'active',c:'#c084fc',note:'Pago periodo $1,312.26 · vence 29 jun',rate:1.199,dueDate:'2026-06-29'},

// Combines the static CALENDAR_EVENTS with live giftFund entries, so gifts
// show up on the calendar and stay in sync if their amount/date/saved changes.
// Maps a MAMA_PLAN month label like "Jul 2026" to the last day of that month, ISO format.
const MONTH_MAP={'Ene':0,'Feb':1,'Mar':2,'Abr':3,'May':4,'Jun':5,'Jul':6,'Ago':7,'Sep':8,'Oct':9,'Nov':10,'Dic':11};
function monthLabelToLastDay(label){
  const [mon,year]=label.split(' ');
  const m=MONTH_MAP[mon];
  const y=parseInt(year);
  const lastDay=new Date(y,m+1,0).getDate();
  return `${y}-${String(m+1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
}

function getAllCalendarEvents(){
  const giftEvents=giftFund.map(g=>({
    date:g.date,title:g.title,amount:Math.max(0,g.amount-g.saved),
    type:'couple',icon:g.icon,urgent:false,
    note:g.saved>0?`Ya tienes ${fmt(g.saved)} guardado`:undefined,
  }));
  // Next pending payment to mom, derived live from her debt balance so it
  // never drifts out of sync if a payment gets confirmed via editDebt.
  let mamaEvents=[];
  const mamaDebt=debts.find(d=>d.id==='mama');
  if(mamaDebt&&mamaDebt.st!=='done'){
    const mamaPaid=mamaDebt.orig-mamaDebt.bal;
    let acc=0;
    for(let i=0;i<MAMA_PLAN.length;i++){
      acc+=MAMA_PLAN[i].total;
      if(acc>mamaPaid){
        mamaEvents=[{date:monthLabelToLastDay(MAMA_PLAN[i].month),title:'Pago a mamá — tatuaje',amount:MAMA_PLAN[i].total,type:'couple',icon:'👩',urgent:false,note:'Sin interés · informal'}];
        break;
      }
    }
  }
  // Income project target dates — shown so their deadlines land on the calendar.
  const incomeEvents=incomeProjects.filter(p=>p.active&&p.target).map(p=>({
    date:p.target,title:p.name,amount:Math.max(0,p.goal-p.raised),
    type:'milestone',icon:p.icon,urgent:false,
    note:p.raised>0?`Llevas ${fmt(p.raised)} de ${fmt(p.goal)}`:'Meta de ingreso',
  }));
  return [...CALENDAR_EVENTS,...giftEvents,...mamaEvents,...incomeEvents];
}

function load(){
  try{txs=JSON.parse(localStorage.getItem(SK))||[];}catch{txs=[];}
  try{debts=JSON.parse(localStorage.getItem(DK))||DEBTS_INIT;}catch{debts=DEBTS_INIT;}
  try{checks=JSON.parse(localStorage.getItem(CK))||{};}catch{checks={};}
  try{wishlist=JSON.parse(localStorage.getItem(WK))||WISH_INIT;}catch{wishlist=WISH_INIT;}
  try{rxList=JSON.parse(localStorage.getItem(RK))||RX_INIT;}catch{rxList=RX_INIT;}
  try{datesList=JSON.parse(localStorage.getItem(DTK))||DATES_INIT;}catch{datesList=DATES_INIT;}
  try{msiList=JSON.parse(localStorage.getItem(MSK))||MSI_INIT.map(m=>({...m}));}catch{msiList=MSI_INIT.map(m=>({...m}));}
  try{MSI_CONFIRMED=JSON.parse(localStorage.getItem(MCK))||{};}catch{MSI_CONFIRMED={};}
  try{giftFund=JSON.parse(localStorage.getItem(GFK))||GIFT_FUND_INIT.map(g=>({...g}));}catch{giftFund=GIFT_FUND_INIT.map(g=>({...g}));}
  try{liquidBalance=JSON.parse(localStorage.getItem(LBK))||{...LIQUID_INIT};}catch{liquidBalance={...LIQUID_INIT};}
  try{incomeProjects=JSON.parse(localStorage.getItem(IPK))||INCOME_PROJECTS_INIT.map(p=>({...p}));}catch{incomeProjects=INCOME_PROJECTS_INIT.map(p=>({...p}));}
  try{streakData=JSON.parse(localStorage.getItem(STK))||{weeks:0,lastCheck:''};}catch{streakData={weeks:0,lastCheck:''};}

  // Migrations for existing saved data (users already have localStorage state):
  // 1. Mercado Pago moved from debts[] to the MSI/loan list. Drop the old debt
  //    entry and make sure the MSI version exists.
  const oldMp=debts.find(d=>d.id==='mp');
  if(oldMp){
    debts=debts.filter(d=>d.id!=='mp');
    if(!msiList.find(m=>m.id==='mercadopago')){
      msiList.unshift({...MSI_INIT.find(m=>m.id==='mercadopago')});
    }
  }
  // 2. Backfill dueDate on debts that predate the editable-date field.
  debts.forEach(d=>{
    if(d.dueDate===undefined){
      const def=DEBTS_INIT.find(x=>x.id===d.id);
      d.dueDate=def?def.dueDate:null;
    }
  });
  // 3. Backfill ownCutoffDay / months on MSI entries that predate them.
  msiList.forEach(m=>{
    const def=MSI_INIT.find(x=>x.id===m.id);
    if(def){ if(m.ownCutoffDay===undefined)m.ownCutoffDay=def.ownCutoffDay; if(m.months===undefined)m.months=def.months; }
  });
  // 4. One-time migration (jul 2026): family loan paid off BBVA + Nu revolvente.
  //    Runs once, guarded by a flag, so it won't clobber later manual edits.
  if(!localStorage.getItem('iv6_mig_familiar')){
    const bbva=debts.find(d=>d.id==='bbva');
    if(bbva){bbva.bal=0;bbva.st='done';bbva.note='✅ Liquidada con préstamo familiar (jul 2026)';}
    const nu=debts.find(d=>d.id==='nu');
    if(nu){nu.bal=0;nu.st='done';nu.note='✅ Revolvente liquidado con préstamo familiar · MSI 0% aparte';}
    if(!debts.find(d=>d.id==='familiar')){
      debts.push({id:'familiar',n:'Préstamo familiar (mamá + tío)',bal:54100,orig:54100,st:'active',c:'#47ffaa',note:'Liquidó BBVA + Nu revolvente · SIN interés · pagar en enero 2027',rate:0,dueDate:'2027-01-31'});
    }
    localStorage.setItem('iv6_mig_familiar','1');
  }

  if(!txs.length)seedData();
  updateStreak();
}
function save(){
  localStorage.setItem(SK,JSON.stringify(txs));
  localStorage.setItem(DK,JSON.stringify(debts));
  localStorage.setItem(CK,JSON.stringify(checks));
  localStorage.setItem(WK,JSON.stringify(wishlist));
  localStorage.setItem(RK,JSON.stringify(rxList));

  localStorage.setItem(MSK,JSON.stringify(msiList));

function fmtDate(d){const[y,m,day]=d.split('-');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${parseInt(day)} ${mn[parseInt(m)-1]}`;}
function weekOf(d){const dt=new Date(d+'T12:00');const dy=dt.getDay();const df=dt.getDate()-dy+(dy===0?-6:1);const mn=new Date(dt);mn.setDate(df);return mn.toISOString().substring(0,10);}
function wkLabel(w){const d=new Date(w+'T12:00');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${d.getDate()} ${mn[d.getMonth()]}`;}
function getPeriods(){const s=new Set();txs.forEach(t=>s.add(t.date.substring(0,7)));const n=new Date();s.add(`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`);return[...s].sort().reverse();}
function periodTxs(p){return txs.filter(t=>t.date.startsWith(p));}
function periodLabel(p){const[y,m]=p.split('-');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${mn[parseInt(m)-1]} ${y}`;}

// Suggests a monthly limit per category from trailing spend history.
// Average of the last 3 completed periods, padded 10% so the limit feels
// achievable rather than punitive. Falls back gracefully with thin history.
function computeBudgetLimits(){
  const allPeriods=getPeriods();
  const completed=allPeriods.slice(1); // skip current in-progress month
  const recent=completed.slice(0,3);
  const byCat={};
  recent.forEach(p=>{
    periodTxs(p).filter(t=>t.type==='expense').forEach(t=>{
      if(!byCat[t.cat])byCat[t.cat]=0;
      byCat[t.cat]+=t.amt;
    });
  });
  const limits={};
  const monthsWithData=Math.max(1,recent.length);
  Object.keys(byCat).forEach(catId=>{
    const avg=byCat[catId]/monthsWithData;
    limits[catId]=Math.ceil((avg*1.1)/50)*50;
  });
  BUDGET_LIMITS=limits;
  return limits;
}

function cat(id){return CATS.find(c=>c.id===id)||{e:'📦',l:id,c:'#555'};}
function daysUntil(dateStr){const t=new Date(dateStr+'T12:00');const n=new Date();return Math.ceil((t-n)/(1000*60*60*24));}
function addDays(dateStr,days){const d=new Date(dateStr+'T12:00');d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];}
function today(){return new Date().toISOString().split('T')[0];}
function monthsBetween(start,end){
  const s=new Date(start+'T12:00'),e=new Date(end+'T12:00');
  let months=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth());
  if(e.getDate()>=s.getDate())months+=1; // count the current period as elapsed once we pass the day-of-month
  return Math.max(1,months);
}

// Given a card's monthly cutoff day-of-month, returns the next cutoff date
// from today onward — today if it lands today, otherwise this month's or
// next month's occurrence.
function nextCutoffDate(cutoffDay){
  const t=new Date(today()+'T12:00');
  const y=t.getFullYear(),m=t.getMonth(),d=t.getDate();
  let candidate=new Date(y,m,cutoffDay);
  if(d>cutoffDay)candidate=new Date(y,m+1,cutoffDay);
  return candidate.toISOString().split('T')[0];
}
// Identifies "this billing period" as YYYY-MM of the next upcoming cutoff,
// used as the key to remember whether that period's MSI discount was confirmed.
function cutoffPeriodKey(cutoffDay){
  return nextCutoffDate(cutoffDay).substring(0,7);
}
// Marks one MSI's monthly installment as paid for this cutoff period —
// reduces its remaining balance and records the period so we don't ask again
// until the following month's cutoff comes around.
function confirmMSIPayment(msiId){
  const m=msiList.find(x=>x.id===msiId);
  if(!m)return;
  const cutoffDay=msiCutoffDay(m);
  if(!cutoffDay)return;
  const period=cutoffPeriodKey(cutoffDay);
  if(MSI_CONFIRMED[m.id]===period)return; // already confirmed this period
  m.paid=Math.min(m.total,m.paid+m.monthly);
  MSI_CONFIRMED[m.id]=period;
  save();render();toast(`${m.name}: pago confirmado ✓`);
}

// Finds the WEEKS[] entry whose startDate/endDate range contains today.
// Falls back to the entry marked status:'current', then to index 1.
function getCurrentWeekIndex(){
  const todayStr=today();
  for(let i=0;i<WEEKS.length;i++){
    const w=WEEKS[i];
    if(w.startDate&&w.endDate&&todayStr>=w.startDate&&todayStr<=w.endDate)return i;
  }
  const cur=WEEKS.findIndex(w=>w.status==='current');
  return cur>=0?cur:1;
}

// Determines whether the current week is a full-pay or reduced-pay ("cut") week.
// Anchored to a known cut week (Mon 22 Jun 2026) and alternating weekly.
let weekTypeOverride=null; // user can flip it manually if payroll shifts
function getWeekType(){
  if(weekTypeOverride)return weekTypeOverride;
  const anchor=new Date('2026-06-22T12:00'); // known "cut" week
  const thisMon=new Date(weekOf(today())+'T12:00');
  const weeksDiff=Math.round((thisMon-anchor)/(1000*60*60*24*7));
  return (weeksDiff%2===0)?'cut':'full';
}
function setWeekType(t){weekTypeOverride=t;renderHoy();}

// Sums this week's expenses per category (Mon–Sun of the current week).
function weeklySpendByCat(){
  const wk=weekOf(today());
  const spend={};
  txs.forEach(t=>{
    if(t.type!=='expense')return;
    if(weekOf(t.date)!==wk)return;
    spend[t.cat]=(spend[t.cat]||0)+t.amt;
  });
  return spend;
}

// ─── Streak ────────────────────────────────────────────────────────────────
function updateStreak(){
  document.getElementById('streak-display').textContent=`🔥 ${streakData.weeks} sem`;
}
function checkInStreak(){
  const today=new Date().toISOString().split('T')[0];
  const lastWeek=streakData.lastCheck?weekOf(streakData.lastCheck):'';
  const thisWeek=weekOf(today);
  if(thisWeek!==lastWeek){
    streakData.weeks++;
    streakData.lastCheck=today;
    save();updateStreak();
    toast(`🔥 ¡Racha de ${streakData.weeks} semanas!`);
  } else {
    toast('Ya registraste esta semana ✓');
  }
}

// TAB: HOY — hero status + scenario picker + next 3 days urgent
// ════════════════════════════════════════════════════════════════════════
// Banner for anything in CALENDAR_EVENTS due within 2 days that the person
// hasn't already marked done via the week's checklist. Checks against the
// `checks` object using the same key pattern the checklist uses, falling back
// to "not done" if no matching checklist item exists for that event.
function renderUrgentReminders(currentWeek){
  const urgent=getAllCalendarEvents().filter(e=>{
    const d=daysUntil(e.date);
    if(d<0||d>2)return false;
    if(e.type!=='debt'&&e.type!=='medical')return false;
    // Consider it handled if any checklist item text mentions this event's title fragment and is checked
    const relatedDone=(currentWeek.actions||[]).some((a,i)=>{
      const key=`${currentWeek.id}_${i}`;
      const isDone=checks[key]!==undefined?checks[key]:(a.done||false);
      return isDone && a.t.toLowerCase().includes(e.title.toLowerCase().split(' ')[0].toLowerCase());
    });
    return !relatedDone;
  }).sort((a,b)=>a.date.localeCompare(b.date));

  let h='';
  urgent.forEach(e=>{
    const d=daysUntil(e.date);
    const dLabel=d===0?'HOY':d===1?'Mañana':`En ${d} días`;
    h+=`<div class="alert urgent fin">
      <div class="ai">${e.icon}</div>
      <div class="ab"><strong>${e.title}</strong> — ${dLabel}${e.amount>0?` · ${fmt(e.amount)}`:''}${e.note?`<br><span style="font-size:10px;">${e.note}</span>`:''}</div>
    </div>`;
  });

  // MSI cutoff confirmations due within ±1 day, not yet confirmed this period.
  msiList.forEach(m=>{
    const remaining=m.total-m.paid;
    if(remaining<=0)return;
    const cutoffDay=msiCutoffDay(m);
    if(!cutoffDay)return;
    const cutoff=nextCutoffDate(cutoffDay);
    const d=daysUntil(cutoff);
    if(d<-1||d>1)return;
    const period=cutoffPeriodKey(cutoffDay);
    if(MSI_CONFIRMED[m.id]===period)return;
    const dLabel=d===0?'HOY':d===1?'Mañana':'Pasó hace 1 día';
    h+=`<div class="alert suggest fin">
      <div class="ai">💳</div>
      <div class="ab"><strong>Corte de ${m.card}</strong> — ${dLabel}<br>
      <span style="font-size:10px;">${m.name}: ${fmt(m.monthly)}/mes debería descontarse</span>
      <button onclick="confirmMSIPayment('${m.id}')" style="margin-top:6px;display:block;font-size:9.5px;padding:5px 11px;background:var(--suggest);color:#000;border:none;border-radius:7px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:600;">Confirmar pago</button>
      </div>
    </div>`;
  });

  return h;
}

    h+=`<div class="card fin" style="border-color:rgba(119,119,170,.25);">

  let totalIn=0,totalOut=0;
  w.items.forEach(sec=>sec.rows.forEach(r=>{
    if(r.type==='in')totalIn+=r.amt;
    else if(r.amt<0)totalOut+=Math.abs(r.amt);
  }));
  const bal=w.saldo!==null?w.saldo:totalIn-totalOut;
  const pct=totalIn>0?Math.min(100,Math.round(totalOut/totalIn*100)):0;
  const pctColor=pct<70?'var(--accent)':pct<90?'var(--suggest)':'var(--urgent)';

  let h=`<div class="wk-nav fin">`;
  WEEKS.forEach((wk,i)=>{
    const ic=colorMap[wk.type]||'var(--accent)';
    const cls=`wk-btn w${wk.type}${i===selWk?' on':''}${wk.status==='done'?' wdone':''}`;
    h+=`<div class="${cls}" onclick="selWeek(${i})">
      <div class="wbn">${wk.n}</div>
      <div class="wbdate">${wk.date.replace('Lun ','')}</div>
      <div class="wbinc" style="color:${ic};">${wk.income>0?fmt(wk.income):'🏁'}</div>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="budget-card fin">
    <div class="bc-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="eyebrow" style="margin-bottom:4px;">${w.n} · ${w.date}</div>
          <div class="num-lg" style="color:${incColor};">${w.income>0?fmt(w.income):'Deuda: $0'}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;">${w.incLabel}</div>
        </div>
        <span style="font-size:9px;padding:4px 10px;font-weight:700;border-radius:7px;background:${st.bg};color:${st.c};border:1px solid ${st.border};">${st.txt}</span>
      </div>
      ${totalIn>0?`<div style="margin-top:11px;">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;"><span style="color:${pctColor};">${pct}% comprometido</span><span>Libre: <span style="color:${bal>=0?'var(--accent)':'var(--urgent)'};">${bal>=0?'+':''}${fmt(bal)}</span></span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${pctColor};"></div></div>
      </div>`:''}
    </div>`;

  w.items.forEach(sec=>{
    const secTotal=sec.rows.reduce((a,r)=>a+(r.amt||0),0);
    h+=`<div class="bc-section">
      <div class="bc-sec-label">
        <span>${sec.g}</span>
        ${secTotal!==0&&sec.rows.some(r=>r.amt!==0)?`<span style="color:${secTotal>0?'var(--accent)':'var(--urgent)'};">${secTotal>0?'+':''}${fmt(secTotal)}</span>`:''}
      </div>`;
    sec.rows.forEach(r=>{
      const cv={pos:'var(--accent)',neg:'var(--urgent)',yel:'var(--accent)',pur:'var(--purple)',blu:'var(--info)',orn:'#ff9f47',gld:'var(--suggest)'}[r.color]||'var(--text)';
      const sign=r.type==='in'?'+':r.amt<0?'−':'';
      const display=r.amt===0?'—':`${sign}${fmt(Math.abs(r.amt))}`;
      h+=`<div class="bc-row">
        <div class="bc-left">
          <div style="font-size:14px;">${r.icon}</div>
          <div><div class="bc-desc">${r.desc}</div>${r.note?`<div class="bc-note">${r.note}</div>`:''}</div>
        </div>
        <div class="bc-amount" style="color:${cv};">${display}</div>
      </div>`;
    });
    h+=`</div>`;
  });

  if(w.saldo!==null){
    h+=`<div class="bc-total">
      <div class="bc-total-label">${bal>=0?'Libre':'Déficit'}</div>
      <div class="bc-total-amount" style="color:${bal>=0?'var(--accent)':'var(--urgent)'};">${bal>=0?'+':''}${fmt(bal)}</div>
    </div>`;
  }
  h+=`</div>`;

  if(w.actions&&w.actions.length){
    h+=`<div class="action-list fin"><div class="al-title">✅ Checklist</div>`;
    w.actions.forEach((a,i)=>{
      const key=`${w.id}_${i}`;
      const done=checks[key]!==undefined?checks[key]:(a.done||false);
      h+=`<div class="al-item ${done?'done':''}" onclick="toggleCheck('${key}')">
        <div class="al-num">${done?'✓':i+1}</div>
        <div class="al-text">${a.t}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  return h;
}

function toggleCheck(key){checks[key]=!checks[key];save();renderPlan();}

function renderPlanCalendario(){
  const todayStr=today();
  if(calSelectedDate===null)calSelectedDate=todayStr;
  const mn=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const firstOfMonth=new Date(calYear,calMonth,1);
  let startDow=firstOfMonth.getDay()-1; if(startDow<0)startDow=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const typeColor={debt:'var(--urgent)',medical:'var(--info)',wish:'var(--purple)',note:'var(--muted)',suggested:'var(--suggest)',milestone:'var(--milestone)',couple:'var(--couple)'};

  // Quick-jump chips to key upcoming months — faster than tapping ‹ › repeatedly
  // to reach something like Enero 2027.
  h+=`<div class="wk-nav fin" style="margin-bottom:10px;">`;
  CAL_QUICKJUMP.forEach(q=>{
    const isOn=q.year===calYear&&q.month===calMonth;
    h+=`<div class="wk-btn ${isOn?'on':''}" style="min-width:54px;" onclick="calJumpTo(${q.year},${q.month})"><div class="wbn">${q.label}</div></div>`;
  });

  h+=`<div class="cal-legend fin" style="cursor:pointer;">
    <span class="cal-legend-item" onclick="toggleCalFilter('debt')" style="opacity:${calFilters.has('debt')?1:.35};"><span class="cal-dot" style="background:${typeColor.debt};"></span>Deuda</span>

  </div>`;

  // Filtered view of all events — used consistently for the grid dots, the

  const filteredEvents=getAllCalendarEvents().filter(e=>calFilters.has(e.type));

  h+=`<div class="cal-grid fin">`;
  dow.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++)h+=`<div class="cal-cell empty"></div>`;

        </div>`;
      events.forEach((e,i)=>{

          <span class="rl" style="font-size:11px;">${e.icon} ${e.title}</span>
          <span class="rv" style="color:${typeColor[e.type]};font-size:11px;">${e.amount>0?fmt(e.amount):'—'}</span>
        </div>`;
      });
      h+=`</div>`;
    });
  }

  h+=`<div class="sec-lbl" style="margin-top:16px;">Pendientes por cotizar/agendar</div><div class="card fin">`;
  PENDING_QUOTES.forEach(p=>{
    h+=`<div class="row"><span class="rl">${p.icon} <strong>${p.title}</strong><span class="sub">${p.note}${p.suggested?` · Sugerido: ${fmtDate(p.suggested)}`:''}</span></span></div>`;
  });
  h+=`</div>`;

  const giftsTotal=GIFTS_PENDING.reduce((a,g)=>a+g.amount,0);
  h+=`<div class="sec-lbl" style="margin-top:16px;">Regalos pendientes — Nicole/Mariana</div><div class="card fin">`;
  GIFTS_PENDING.forEach(g=>{
    h+=`<div class="row"><span class="rl">${g.icon} ${g.title}<span class="sub">Sugerido: ${fmtDate(g.suggested)}</span></span><span class="rv neg">${fmt(g.amount)}</span></div>`;
  });
  h+=`<div class="row" style="border-top:1px solid var(--border);margin-top:4px;"><span class="rl"><strong>Total</strong></span><span class="rv neg" style="font-weight:700;">${fmt(giftsTotal)}</span></div></div>`;

  h+=`<div class="alert info fin">
    <div class="ai">📲</div>
    <div class="ab"><strong>Sincronizar:</strong> agrega manualmente a Apple/Google Calendar las fechas importantes — toma 10 segundos y te llega la notificación nativa.</div>
  </div>`;

  return h;
}

// Toggling a filter chip removes its type if active, adds it if not. If this
// would empty the set entirely, treat it as "show everything" instead of
// "show nothing" — an empty calendar with no visible feedback is confusing.
function toggleCalFilter(type){
  if(calFilters.has(type)){
    if(calFilters.size===1){calFilters=new Set(['debt','medical','couple','suggested','milestone']);}
    else{calFilters.delete(type);}
  } else {
    calFilters.add(type);
  }
  renderPlan();
}
function resetCalFilters(){
  calFilters=new Set(['debt','medical','couple','suggested','milestone']);
  renderPlan();
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderPlan();
}
function calGoToday(){
  const d=new Date(today()+'T12:00');
  calMonth=d.getMonth();calYear=d.getFullYear();calSelectedDate=today();
  renderPlan();
}
function calJumpTo(year,month){
  calYear=year;calMonth=month;
  renderPlan();
}
function calSelectDay(dateStr){
  calSelectedDate=dateStr;
  const d=new Date(dateStr+'T12:00');
  calMonth=d.getMonth();calYear=d.getFullYear();
  renderPlan();
}

// Bar chart: income vs expense per week within the period, with a net-balance line on top.
// Built from the same txs the donut uses — groups by ISO week start.
function renderWeeklyFlowChart(list){
  if(!list.length)return '';
  const byW={};
  list.forEach(t=>{const w=weekOf(t.date);if(!byW[w])byW[w]={in:0,out:0};
    if(t.type==='income')byW[w].in+=t.amt; else byW[w].out+=t.amt;
  });
  const weeks=Object.keys(byW).sort();
  if(weeks.length<1)return '';

  const W=320,H=160,padL=10,padR=10,padT=24,padB=22;
  const maxBar=Math.max(...weeks.map(w=>Math.max(byW[w].in,byW[w].out)),1);
  const n=weeks.length;
  const slotW=(W-padL-padR)/n;
  const barW=Math.min(22,slotW*0.32);
  const chartH=H-padT-padB;

  const balances=weeks.map(w=>byW[w].in-byW[w].out);
  const maxBal=Math.max(...balances.map(Math.abs),1);

  let svg=`<svg class="chart-svg-wrap" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  // zero line
  svg+=`<line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="var(--border)" stroke-width="1"/>`;

  const linePts=[];
  weeks.forEach((w,i)=>{
    const cx=padL+slotW*i+slotW/2;
    const inH=(byW[w].in/maxBar)*chartH;
    const outH=(byW[w].out/maxBar)*chartH;
    // income bar (left of center)
    svg+=`<rect x="${cx-barW-2}" y="${padT+chartH-inH}" width="${barW}" height="${inH}" rx="2" fill="#d4ff47" opacity="0.85"/>`;
    // expense bar (right of center)
    svg+=`<rect x="${cx+2}" y="${padT+chartH-outH}" width="${barW}" height="${outH}" rx="2" fill="#ff4d6d" opacity="0.85"/>`;
    // net balance point, mapped onto its own scale within the chart band
    const bal=balances[i];
    const balY=padT+chartH/2-(bal/maxBal)*(chartH/2-4);
    linePts.push(`${cx},${balY}`);
    svg+=`<text x="${cx}" y="${H-6}" text-anchor="middle" class="chart-pt-label">${wkLabel(w)}</text>`;
  });
  if(linePts.length>1){
    svg+=`<polyline points="${linePts.join(' ')}" fill="none" stroke="#47b8ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
  }
  linePts.forEach(p=>{
    const [x,y]=p.split(',');
    svg+=`<circle cx="${x}" cy="${y}" r="3" fill="#47b8ff" stroke="#0e0e1c" stroke-width="1"/>`;
  });

  svg+=`</svg>`;

  return `<div class="chart-card fin">
    <div class="sec-lbl">Flujo semanal — ingresos, gastos y balance</div>
    ${svg}
    <div class="chart-legend-row">
      <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#d4ff47;"></span>Ingresos</span>
      <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#ff4d6d;"></span>Gastos</span>
      <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#47b8ff;border-radius:50%;"></span>Balance neto</span>
    </div>
  </div>`;
}

// Per-category spend this period vs an auto-suggested limit (computeBudgetLimits()).
// Categories with no spend this period and no limit are skipped — nothing to show.
function renderBudgetByCategory(list,curP,periods){
  if(!Object.keys(BUDGET_LIMITS).length)computeBudgetLimits();
  const spendByCat={};
  list.filter(t=>t.type==='expense').forEach(t=>{spendByCat[t.cat]=(spendByCat[t.cat]||0)+t.amt;});
  const catIds=new Set([...Object.keys(spendByCat),...Object.keys(BUDGET_LIMITS)]);
  if(!catIds.size)return '';

  let h=`<div class="card fin"><div class="sec-lbl">Presupuesto por categoría · ${periodLabel(curP)}</div>`;
  [...catIds].sort((a,b)=>(spendByCat[b]||0)-(spendByCat[a]||0)).forEach(catId=>{
    const c=cat(catId);
    const spent=spendByCat[catId]||0;
    const limit=BUDGET_LIMITS[catId];
    if(!limit&&!spent)return;
    const pct=limit?Math.min(100,Math.round(spent/limit*100)):0;
    const over=limit&&spent>limit;
    const barColor=over?'var(--urgent)':pct>80?'var(--suggest)':c.c;
    h+=`<div class="bar-wrap">
      <div class="bar-lbl">
        <span>${c.e} ${c.l}</span>
        <span style="color:${over?'var(--urgent)':'var(--muted)'};">${fmt(spent)}${limit?` / ${fmt(limit)}`:''}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${limit?pct:0}%;background:${barColor};"></div></div>

// Compares total spend (and per-category swings) of curP vs the period right before it.
function renderMonthComparison(curP,periods){
  const idx=periods.indexOf(curP);
  const prevP=periods[idx+1];
  if(!prevP)return '';
  const curList=periodTxs(curP).filter(t=>t.type==='expense');
  const prevList=periodTxs(prevP).filter(t=>t.type==='expense');
  const curTotal=curList.reduce((a,t)=>a+t.amt,0);
  const prevTotal=prevList.reduce((a,t)=>a+t.amt,0);
  if(!prevTotal)return '';
  const diffPct=Math.round((curTotal-prevTotal)/prevTotal*100);
  const curByCat={},prevByCat={};
  curList.forEach(t=>curByCat[t.cat]=(curByCat[t.cat]||0)+t.amt);
  prevList.forEach(t=>prevByCat[t.cat]=(prevByCat[t.cat]||0)+t.amt);
  const swings=[];
  new Set([...Object.keys(curByCat),...Object.keys(prevByCat)]).forEach(catId=>{
    const c=curByCat[catId]||0,p=prevByCat[catId]||0;
    if(p>0&&Math.abs(c-p)/p>=0.15){
      swings.push({catId,pct:Math.round((c-p)/p*100),cur:c,prev:p});
    }
  });
  swings.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));

  const overall=diffPct>0?'urgent':'ok';
  let h=`<div class="alert ${overall} fin">
    <div class="ai">${diffPct>0?'📈':'📉'}</div>
    <div class="ab"><strong>vs ${periodLabel(prevP)}:</strong> gastaste ${diffPct>0?diffPct+'% más':Math.abs(diffPct)+'% menos'} en total (${fmt(curTotal)} vs ${fmt(prevTotal)}).`;
  if(swings.length){
    const top=swings[0];
    const c=cat(top.catId);
    h+=`<br>${c.e} ${c.l}: ${top.pct>0?'+':''}${top.pct}% (${fmt(top.cur)} vs ${fmt(top.prev)})`;
  }
  h+=`</div></div>`;
  return h;
}

// SVG line chart: total debt trending down over the plan's key milestones.
// No external charting library — built by hand so it always renders identically in Safari.
function renderDebtTrendChart(){
  const pts=DEBT_PROJECTION;
  const W=320,H=170,padL=14,padR=14,padT=34,padB=26;
  const maxVal=Math.max(...pts.map(p=>p.value));
  const n=pts.length;
  const xStep=(W-padL-padR)/(n-1);
  const xAt=i=>padL+i*xStep;
  const yAt=v=>padT+(1-(v/maxVal))*(H-padT-padB);

  const linePts=pts.map((p,i)=>`${xAt(i)},${yAt(p.value)}`).join(' ');
  const areaPts=`${xAt(0)},${H-padB} ${linePts} ${xAt(n-1)},${H-padB}`;

  // Alternate value labels above/below the line to avoid them crashing into
  // each other on a steep descent — odd points sit higher, even points lower.
  let svg=`<svg class="chart-svg-wrap" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="debtFade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff4d6d" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#ff4d6d" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${areaPts}" fill="url(#debtFade)"/>
    <polyline points="${linePts}" fill="none" stroke="#ff4d6d" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  pts.forEach((p,i)=>{
    const x=xAt(i),y=yAt(p.value);
    const isLast=i===n-1;
    const isFirst=i===0;
    const anchor=isFirst?'start':isLast?'end':'middle';
    const labelY=y-10; // value always above its point now; padT gives enough headroom
    svg+=`<circle cx="${x}" cy="${y}" r="${isFirst?4:3}" fill="${isLast?'#47ffaa':'#ff4d6d'}" stroke="#0e0e1c" stroke-width="1.5"/>`;
    svg+=`<text x="${x}" y="${labelY}" text-anchor="${anchor}" class="chart-pt-value">${p.value>=1000?Math.round(p.value/1000)+'k':p.value}</text>`;
    svg+=`<text x="${x}" y="${H-8}" text-anchor="${anchor}" class="chart-pt-label">${p.label}</text>`;
  });

  svg+=`</svg>`;

  // Detail list below the chart spells out what happens at each milestone —
  // this is where the longer text lives now, with room to breathe.
  let detailList=`<div style="margin-top:4px;">`;
  pts.forEach((p,i)=>{
    if(i===0)return; // skip "Hoy", it's just the starting point
    detailList+=`<div class="row" style="padding:5px 0;">
      <span class="rl" style="font-size:10.5px;">${p.detail}</span>
      <span class="rv" style="color:${i===pts.length-1?'var(--accent)':'var(--urgent)'};font-size:11px;">${fmt(p.value)}</span>
    </div>`;
  });
  detailList+=`</div>`;

  return `<div class="chart-card fin">
    <div class="sec-lbl">Proyección de deuda total</div>
    ${svg}
    <div class="chart-legend-row">
      <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#ff4d6d;"></span>Deuda pendiente</span>
      <span class="chart-legend-item"><span class="chart-legend-dot" style="background:#47ffaa;"></span>Meta: $0</span>
    </div>
    ${detailList}
  </div>`;
}

let whatIfDebtId=null, whatIfExtra=500;

// Simulates months-to-payoff for a debt at its current minimum-style payment
// vs. minimum+extra, using simple monthly amortization (rate/12 applied to
// remaining balance each month). Capped at 600 months so a near-zero payment
// can't loop forever — that edge case just shows "no se liquida así".
function simulatePayoff(balance,annualRate,monthlyPayment){
  if(monthlyPayment<=0)return null;
  const monthlyRate=annualRate/12;
  let bal=balance,months=0,totalInterest=0;
  while(bal>0&&months<600){
    const interest=bal*monthlyRate;
    totalInterest+=interest;
    const principal=monthlyPayment-interest;
    if(principal<=0)return null; // payment doesn't even cover interest — never pays off
    bal=Math.max(0,bal-principal);
    months++;
  }
  return months>=600?null:{months,totalInterest};
}

function renderWhatIfCalculator(){
  const candidates=debts.filter(d=>d.st!=='done'&&d.rate>0);
  if(!candidates.length)return '';
  if(!whatIfDebtId||!candidates.find(d=>d.id===whatIfDebtId))whatIfDebtId=candidates[0].id;
  const d=debts.find(x=>x.id===whatIfDebtId);
  const baseline=Math.max(d.bal*0.06,300); // rough "minimum-style" monthly payment estimate
  const withExtra=baseline+whatIfExtra;

  const a=simulatePayoff(d.bal,d.rate,baseline);
  const b=simulatePayoff(d.bal,d.rate,withExtra);

  return `<div class="card fin" style="border-color:rgba(192,132,252,.25);margin-top:4px;">
    <div class="sec-lbl">🧮 ¿Qué pasa si pago extra?</div>
    <div class="acct-grid" style="grid-template-columns:repeat(${Math.min(4,candidates.length)},1fr);margin-bottom:12px;">

      <label class="flbl">Extra mensual a ${d.n}</label>
      <input class="finp" type="range" min="0" max="5000" step="100" value="${whatIfExtra}" oninput="setWhatIfExtra(this.value)" style="padding:0;height:32px;">
      <div style="text-align:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--purple);margin-top:4px;">+${fmt(whatIfExtra)}/mes</div>

// iOS blocks prompt()/alert()/confirm() when the app runs as a standalone PWA
// (added to home screen), so all numeric edits go through this in-app modal.
let numberModalCallback=null;
function openNumberModal(title,label,currentValue,onSave){
  numberModalCallback=onSave;
  document.getElementById('mtitle').textContent=title;
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="flbl">${label}</label><input class="finp big" id="num-modal-input" type="number" inputmode="decimal" value="${currentValue}" step="0.01"></div>
    <button class="save-btn" onclick="saveNumberModal()">Guardar</button>
  `;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>{const el=document.getElementById('num-modal-input');if(el){el.focus();el.select();}},250);
}
function saveNumberModal(){
  const v=document.getElementById('num-modal-input').value;
  const n=parseFloat(v);
  if(isNaN(n)||n<0){toast('Monto inválido');return;}
  closeModal();
  if(numberModalCallback){numberModalCallback(n);numberModalCallback=null;}
}

function editDebt(id){
  const d=debts.find(x=>x.id===id);if(!d)return;
  openNumberModal(`Actualizar ${d.n}`,`Nuevo saldo (actual: ${fmt(d.bal)})`,d.bal,(n)=>{
    d.bal=n;
    if(n===0)d.st='done';
    else if(d.st==='done')d.st='active';
    if(n>d.orig)d.orig=n;
    save();renderDinero();toast('Saldo actualizado ✓');
  });
}

// TAB: NOSOTROS — citas + presupuesto compartido + gastos compartidos
// ════════════════════════════════════════════════════════════════════════
// ─── FONDO DE REGALOS ───────────────────────────────────────────────────────
// Money committed to other people — family, partner, friends — distinct from
// the personal wishlist. Each entry shows how much per week to set aside to
// have it ready by its date, and a manual "saved so far" tracker.
const GIFT_CATEGORIES={
  familia:{label:'Familia',color:'var(--couple)',icon:'👨‍👩‍👧'},
  pareja:{label:'Pareja',color:'var(--purple)',icon:'💕'},
  navidad:{label:'Navidad',color:'var(--milestone)',icon:'🎄'},
  amigos:{label:'Amigos',color:'var(--info)',icon:'🎉'},
};

function renderGiftFund(){
  const todayStr=today();
  const upcoming=[...giftFund].filter(g=>g.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  const totalNeeded=upcoming.reduce((a,g)=>a+Math.max(0,g.amount-g.saved),0);
  const totalSaved=upcoming.reduce((a,g)=>a+g.saved,0);

  let h=`<div class="sec-lbl" style="margin-top:15px;">🎁 Fondo de regalos</div>
  <div class="card fin" style="border-color:rgba(255,138,101,.25);">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;">
      <div>
        <div class="hoy-balance-label">Pendiente por ahorrar</div>
        <div class="num-md" style="color:var(--couple);">${fmt(totalNeeded)}</div>
      </div>
      <div style="text-align:right;">
        <div class="hoy-balance-label">Ya guardado</div>
        <div class="num-md" style="color:var(--accent);">${fmt(totalSaved)}</div>
      </div>
    </div>
  </div>`;

  if(!upcoming.length){
    h+=`<div class="empty"><div class="empty-icon">🎁</div><div class="empty-text">Sin regalos próximos registrados</div></div>`;
  } else {
    upcoming.forEach(g=>{
      const remaining=Math.max(0,g.amount-g.saved);
      const days=daysUntil(g.date);
      const weeksLeft=Math.max(1,Math.ceil(days/7));
      const perWeek=remaining>0?Math.ceil(remaining/weeksLeft):0;
      const cat=GIFT_CATEGORIES[g.category]||GIFT_CATEGORIES.amigos;
      const dLabel=days===0?'HOY':days===1?'Mañana':days<30?`En ${days} días`:`En ~${Math.round(days/30)} meses`;
      const pct=Math.min(100,Math.round(g.saved/g.amount*100));
      h+=`<div class="date-card fin" style="border-color:${cat.color}40;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;">
          <div>
            <div style="font-size:9px;color:${cat.color};letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;">${cat.icon} ${cat.label}</div>
            <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;">${g.icon} ${g.title}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${fmtDate(g.date)} · ${dLabel}</div>
          </div>
          <div style="text-align:right;">
            <div class="num-md" style="color:${cat.color};">${fmt(g.amount)}</div>
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cat.color};"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--muted);">
          <span>Guardado: ${fmt(g.saved)}</span>
          ${remaining>0?`<span style="color:${cat.color};font-weight:600;">Aparta ~${fmt(perWeek)}/sem</span>`:`<span style="color:var(--accent);font-weight:600;">✓ Completo</span>`}
        </div>
        ${remaining>0?`<button onclick="addToGiftFund('${g.id}')" style="width:100%;margin-top:8px;padding:7px;font-size:10px;background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;">+ Apartar ${fmt(Math.min(perWeek,remaining))}</button>`:''}
      </div>`;
    });
  }

  h+=`<button onclick="openGiftModal()" style="width:100%;padding:13px;background:var(--s2);border:1px dashed var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:13px;margin:4px 0 4px;">+ Agregar cumpleaños de amigo</button>`;

  return h;
}

function addToGiftFund(id){
  const g=giftFund.find(x=>x.id===id);if(!g)return;
  const remaining=Math.max(0,g.amount-g.saved);
  const days=daysUntil(g.date);
  const weeksLeft=Math.max(1,Math.ceil(days/7));
  const perWeek=Math.min(Math.ceil(remaining/weeksLeft),remaining);
  g.saved=Math.min(g.amount,g.saved+perWeek);
  save();renderNosotros();toast(`${g.title}: +${fmt(perWeek)} apartado 💗`);
}

function openGiftModal(){
  modalMode='gift';
  document.getElementById('mtitle').textContent='Agregar cumpleaños';
  document.getElementById('modal-body').innerHTML=`

  document.getElementById('overlay').classList.add('on');
}
function saveGift(){
  const name=document.getElementById('g-name').value.trim();
  const amount=parseFloat(document.getElementById('g-amount').value)||300;
  const date=document.getElementById('g-date').value;
  if(!name||!date){toast('Falta el nombre o la fecha');return;}
  giftFund.push({id:Date.now().toString(),title:`Cumpleaños — ${name}`,amount,icon:'🎉',date,category:'amigos',saved:0});

}

// Suggests which debt to attack with extra income — highest interest rate first
// among active, interest-bearing debts (avalanche method). Skips 0% family debt.
function suggestDebtTarget(){
  const candidates=debts.filter(d=>d.st!=='done'&&d.st!=='auto'&&d.rate>0&&d.bal>0);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>b.rate-a.rate);
  return candidates[0];
}

function renderIncomeProjects(){
  const active=incomeProjects.filter(p=>p.active);
  if(!active.length)return '';
  const totalGoal=active.reduce((a,p)=>a+p.goal,0);
  const totalRaised=active.reduce((a,p)=>a+p.raised,0);
  const target=suggestDebtTarget();

  let h=`<div class="card fin" style="border-color:rgba(212,255,71,.3);background:linear-gradient(160deg,rgba(212,255,71,.08),transparent);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div class="sec-lbl" style="margin:0;">💪 Proyectos de ingreso</div>
      <button onclick="openProjectModal()" style="font-size:9px;padding:3px 9px;background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:7px;cursor:pointer;font-family:'DM Mono',monospace;">+ Nuevo</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;">
      <div><div class="hoy-balance-label">Juntado</div><div class="num-lg" style="color:var(--accent);">${fmt(totalRaised)}</div></div>
      <div style="text-align:right;"><div class="hoy-balance-label">Meta total</div><div class="num-md" style="color:var(--muted);">${fmt(totalGoal)}</div></div>
    </div>
    <div class="bar-bg" style="margin-top:8px;"><div class="bar-fill" style="width:${totalGoal>0?Math.min(100,Math.round(totalRaised/totalGoal*100)):0}%;background:var(--accent);"></div></div>
    ${target?`<div style="font-size:10px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:1px solid rgba(212,255,71,.15);">💡 Cada peso que juntes → mándalo a <strong style="color:${target.c};">${target.n}</strong> (${Math.round(target.rate*100)}% interés, la más cara). Es donde más rápido reduces lo que pagas.</div>`:''}
  </div>`;

  active.forEach(p=>{
    const pct=p.goal>0?Math.min(100,Math.round(p.raised/p.goal*100)):0;
    const days=p.target?daysUntil(p.target):null;
    const dLabel=days===null?'':days<0?'pasó la fecha':days===0?'es hoy':days===1?'mañana':`en ${days} días`;
    let unitLine='';
    if(p.unit&&p.unitsTotal){
      const soldPct=Math.round((p.unitsSold||0)/p.unitsTotal*100);
      unitLine=`<div style="font-size:10px;color:var(--muted);margin-top:5px;">${p.unitsSold||0} de ${p.unitsTotal} ${p.unit}s vendidos (${soldPct}%)</div>`;
    }
    h+=`<div class="date-card fin" style="border-color:${p.tentative?'rgba(119,119,170,.3)':'rgba(212,255,71,.2)'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;">${p.icon} ${p.name}${p.tentative?' <span style="font-size:9px;color:var(--muted2);">(por confirmar)</span>':''}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${p.note}</div>
          ${p.target?`<div style="font-size:10px;color:${days!==null&&days<=3?'var(--suggest)':'var(--muted)'};margin-top:2px;">🗓️ ${fmtDate(p.target)} · ${dLabel}</div>`:''}
        </div>
        <div style="text-align:right;">
          <div class="num-md" style="color:var(--accent);">${fmt(p.raised)}</div>
          <div style="font-size:9px;color:var(--muted);">de ${fmt(p.goal)}</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${p.tentative?'var(--muted2)':'var(--accent)'};"></div></div>
      ${unitLine}
      ${p.cost>0?`<div style="font-size:9.5px;color:var(--muted);margin-top:5px;">Costo del proyecto: ${fmt(p.cost)} (págalo con lo ya vendido, no antes)</div>`:''}
      <button onclick="addToProject('${p.id}')" style="width:100%;margin-top:8px;padding:8px;font-size:10.5px;background:var(--accent);color:#000;border:none;border-radius:9px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:600;">+ Registrar lo que llevas</button>
    </div>`;
  });

  return h;
}

function addToProject(id){
  const p=incomeProjects.find(x=>x.id===id);if(!p)return;
  openNumberModal(`${p.name}`,`¿Cuánto llevas juntado en total? (actual: ${fmt(p.raised)})`,p.raised,(n)=>{
    p.raised=n;
    // If it's a unit-based project, back-calculate approx units sold
    if(p.unitPrice&&p.unit){p.unitsSold=Math.round(n/p.unitPrice);}
    save();renderNosotros();
    const target=suggestDebtTarget();
    toast(target?`Registrado ✓ Recuerda: mándalo a ${target.n}`:'Registrado ✓');
  });
}

function renderNosotros(){
  const todayStr=today();
  const curBudget=getCoupleBudgetForDate(todayStr);
  const curMonth=todayStr.substring(0,7);
  const spentThisMonth=datesList.filter(d=>d.date.startsWith(curMonth)&&d.done).reduce((a,d)=>a+d.cost,0);
  const pctUsed=Math.min(100,Math.round(spentThisMonth/curBudget*100));
  const pctColor=pctUsed<70?'var(--accent)':pctUsed<100?'var(--suggest)':'var(--urgent)';

  let h=renderIncomeProjects();

  h+=`<div class="card fin" style="border-color:rgba(255,138,101,.3);">
    <div class="sec-lbl">Presupuesto de citas — ${periodLabel(curMonth)}</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:9px;">
      <div class="num-lg" style="color:${pctColor};">${fmt(spentThisMonth)}</div>
      <div style="font-size:11px;color:var(--muted);">de ${fmt(curBudget)}/mes</div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pctUsed}%;background:${pctColor};"></div></div>
    <div style="font-size:10px;color:var(--muted);margin-top:9px;">${todayStr<'2026-12-01'?'Mientras dura la deuda pesada (hasta nov 2026)':'Presupuesto ampliado — BBVA y Digitt ya liberaron margen'}</div>
  </div>`;

  h+=`<div class="sec-lbl" style="margin-top:15px;">Citas planeadas</div>`;
  const sortedDates=[...datesList].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sortedDates.length){
    h+=`<div class="empty"><div class="empty-icon">💗</div><div class="empty-text">Sin citas planeadas aún</div></div>`;
  } else {
    sortedDates.forEach(d=>{

function saveDate(){

function exportData(){
  const backup={
    version:'v6',exportedAt:new Date().toISOString(),
    txs,debts,checks,wishlist,rxList,datesList,streakData,
  };
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ivan-finance-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Respaldo descargado ✓');
}

// Visual progress toward the house down payment goal (MILESTONES entry m6).
// Control de fugas: suscripciones (fijas mensuales que se pueden pausar) y
// gastos hormiga (café/antojitos, pequeños pero acumulan). Para ADHD, lo clave
// es que sean VISIBLES y con un tope claro, no prohibiciones absolutas.
function renderLeakControl(){
  const totalSubs=SUBS_INIT.reduce((a,s)=>a+s.cost,0);

  let h=`<div class="h2" style="margin:20px 0 14px;">🔍 Control de fugas</div>`;

  // Subscriptions
  h+=`<div class="card fin" style="border-color:rgba(255,200,71,.25);">
    <div class="sec-lbl">Suscripciones activas · ${fmt(totalSubs)}/mes</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px;">Juntas son ${fmt(totalSubs*12)}/año. En modo ajustado, cada uno que pauses es dinero directo a tus prioridades.</div>`;
  SUBS_INIT.forEach(s=>{
    h+=`<div class="row"><span class="rl">${s.icon} <strong>${s.name}</strong><span class="sub">${s.note}</span></span><span class="rv c-suggest">${fmt(s.cost)}</span></div>`;
  });
  h+=`<div class="alert suggest fin" style="margin-top:11px;margin-bottom:0;">
    <div class="ai">💡</div>
    <div class="ab">Si pausas Claude Pro y Google AI este mes, recuperas ~${fmt(348.90+49)}. Puedes reactivarlas cuando salgas del apuro.</div>
  </div></div>`;

  // Ant expenses this week
  const weekStart=weekOf(today());
  const antTxs=txs.filter(t=>{
    if(t.type!=='expense')return false;
    if(weekOf(t.date)!==weekStart)return false;
    return t.amt<=ANT_INIT.threshold&&ANT_INIT.categories.includes(t.cat);
  });
  const antTotal=antTxs.reduce((a,t)=>a+t.amt,0);
  const antPct=Math.min(100,Math.round(antTotal/ANT_INIT.weeklyLimit*100));
  const antColor=antTotal<=ANT_INIT.weeklyLimit*0.7?'var(--accent)':antTotal<=ANT_INIT.weeklyLimit?'var(--suggest)':'var(--urgent)';

  h+=`<div class="card fin">
    <div class="sec-lbl">Gastos hormiga esta semana</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:9px;">Café, antojitos y compras chicas. No para eliminarlos — para verlos. Tope suave: ${fmt(ANT_INIT.weeklyLimit)}/sem.</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;">
      <div class="num-md" style="color:${antColor};">${fmt(antTotal)}</div>
      <div style="font-size:10px;color:var(--muted);">de ${fmt(ANT_INIT.weeklyLimit)}</div>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${antPct}%;background:${antColor};"></div></div>`;
  if(antTotal>ANT_INIT.weeklyLimit){
    h+=`<div class="alert urgent fin" style="margin-top:10px;margin-bottom:0;">
      <div class="ai">🐜</div>
      <div class="ab">Pasaste el tope hormiga por ${fmt(antTotal-ANT_INIT.weeklyLimit)}. No es el fin del mundo, pero anótalo — estos son los que menos duelen y más suman al mes.</div>
    </div>`;
  } else if(antTxs.length===0){
    h+=`<div style="font-size:10.5px;color:var(--muted);margin-top:9px;">Sin gastos hormiga registrados esta semana. 👌</div>`;
  } else {
    h+=`<div style="font-size:10.5px;color:var(--muted);margin-top:9px;">${antTxs.length} gastito${antTxs.length>1?'s':''} esta semana. Vas bien.</div>`;
  }
  h+=`</div>`;

  return h;
}

function renderHouseGoal(){

  // Rough proxy for "saved toward the business" right now: Revolut liquid.

function updateRxDate(id){
  const rx=rxList.find(r=>r.id===id);if(!rx)return;
  rx.rxDate=today();
  save();renderMas();toast('Fecha de receta actualizada ✓');
}

// Registers today's dose: increments the count taken from the current box
// and stamps lastTaken so the button can't be double-tapped same day.
function takePill(id){
  const rx=rxList.find(r=>r.id===id);if(!rx)return;
  if(rx.lastTaken===today()){toast('Ya registraste la toma de hoy');return;}
  if(rx.taken>=rx.boxSize){toast('Caja agotada — registra una caja nueva');return;}
  rx.taken+=1;
  rx.lastTaken=today();
  save();renderMas();
  const remaining=rx.boxSize-rx.taken;
  toast(remaining<=3?`${rx.name}: quedan ${remaining} — compra pronto ⚠️`:`${rx.name}: tomada ✓ (${remaining} restantes)`);
}

// Starts a fresh box — resets the count to 0 against the same boxSize.
// Doesn't touch lastTaken so "Tomé hoy" stays correctly disabled if you
// already took today's dose before opening the new box.
function refillRx(id){
  const rx=rxList.find(r=>r.id===id);if(!rx)return;
  rx.taken=0;
  save();renderMas();toast(`${rx.name}: caja nueva registrada (${rx.boxSize} pastillas) ✓`);
}

function setType(t){

function renderCats(){

function selCat(id){curCat=id;renderCats();}

function renderAccts(){
  const ag=document.getElementById('acct-grid');if(!ag)return;
  ag.innerHTML=ACCOUNTS.map(a=>{
    const debt=a.debtId?debts.find(d=>d.id===a.debtId):null;
    const sub=debt?fmt(debt.bal):'';
    return `<div class="acctb ${a.id===curAcct?'on':''}" onclick="selAcct('${a.id}')">
      <span class="ace">${a.e}</span><span class="acn">${a.n}</span>${sub?`<span class="acs">${sub}</span>`:''}
    </div>`;
  }).join('');
}
function selAcct(id){curAcct=id;renderAccts();}

// Applies a transaction's effect on a credit account's debt balance.
// sign=+1 to apply (on save), sign=-1 to undo (on delete/edit).
function applyAccountEffect(tx,sign){
  const acct=getAccount(tx.acct);
  if(!acct||acct.type!=='credit'||!acct.debtId)return;
  const d=debts.find(x=>x.id===acct.debtId);
  if(!d)return;
  // Expense on a credit card raises its balance; income/payment lowers it.
  const delta=tx.type==='expense'?tx.amt:-tx.amt;
  d.bal=Math.max(0,d.bal+delta*sign);
  // If new spending pushes the balance above what we've ever tracked, raise
  // the reference ceiling too — otherwise "% paid" goes negative and the
  // progress bar looks broken instead of just resetting to a fresh climb.
  if(d.bal>d.orig)d.orig=d.bal;
  if(d.bal===0)d.st='done';
  else if(d.st==='done')d.st='active';
}

function saveTx(){
  const amt=parseFloat(document.getElementById('inp-amt').value);
  const desc=document.getElementById('inp-desc').value.trim()||'Sin descripción';
  const date=document.getElementById('inp-date').value;
  if(!amt||amt<=0){toast('Ingresa un monto');return;}
  if(!date){toast('Selecciona fecha');return;}
  const tx={id:Date.now().toString(),type:curType,amt,desc,cat:curCat,date,acct:curAcct};
  txs.push(tx);
  applyAccountEffect(tx,1);
  save();closeModal();render();
  const acct=getAccount(curAcct);
  const acctNote=acct.type==='credit'?` · ${acct.n} ahora en ${fmt(debts.find(d=>d.id===acct.debtId).bal)}`:'';
  toast((curType==='income'?'Ingreso guardado ✓':'Gasto guardado ✓')+acctNote);
}
function delTx(id){
  const tx=txs.find(t=>t.id===id);
  if(tx)applyAccountEffect(tx,-1);
  txs=txs.filter(t=>t.id!==id);
  save();render();toast('Eliminado');
}

// ════════════════════════════════════════════════════════════════════════
// TAB SWITCHING — 5 main tabs
// ════════════════════════════════════════════════════════════════════════
function switchTab(tab,btn){
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=tab;
  ['hoy','plan','dinero','nosotros','mas'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('on',t===tab);
  });
  render();
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2200);
}

function render(){
  if(curTab==='hoy')renderHoy();
  else if(curTab==='plan')renderPlan();
  else if(curTab==='dinero')renderDinero();
  else if(curTab==='nosotros')renderNosotros();
  else if(curTab==='mas')renderMas();
}

load();selWk=getCurrentWeekIndex();render();
</script>
