<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ivan · Finance OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--s1:#0e0e1c;--s2:#151525;--s3:#1c1c30;
  --border:#252540;--border2:#353555;
  --text:#eeeef8;--muted:#7777aa;--muted2:#44445a;
  --accent:#d4ff47;--accent-dim:rgba(212,255,71,0.1);
  --red:#ff4d6d;--red-dim:rgba(255,77,109,0.12);
  --green:#47ffaa;--green-dim:rgba(71,255,170,0.08);
  --blue:#47b8ff;--blue-dim:rgba(71,184,255,0.08);
  --orange:#ff9f47;--orange-dim:rgba(255,159,71,0.08);
  --purple:#c084fc;--purple-dim:rgba(192,132,252,0.08);
  --gold:#ffc847;--gold-dim:rgba(255,200,71,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;}

/* Shell */
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-0.5px;}
.topbar-title span{color:var(--accent);}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--gold-dim);border:1px solid rgba(255,200,71,.3);padding:3px 8px;font-size:10px;color:var(--gold);font-weight:700;}
.topbar-right{display:flex;gap:5px;}
.tbtn{height:30px;padding:0 10px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:active{transform:scale(.95);}
.tbtn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}

/* Nav - 6 tabs */
.nav{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.navt{flex:1;min-width:52px;padding:9px 2px;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap;}
.navt.on{color:var(--accent);border-bottom-color:var(--accent);}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.view{padding:12px 12px 90px;display:none;}
.view.on{display:block;}

/* Utilities */
.card{background:var(--s1);border:1px solid var(--border);padding:13px;margin-bottom:9px;}
.sec-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(37,37,64,.6);font-size:12px;gap:8px;}
.row:last-child{border-bottom:none;}
.rl{color:var(--muted);flex:1;line-height:1.5;}
.rl strong{color:var(--text);}
.rl .sub{display:block;font-size:10px;color:var(--muted2);margin-top:1px;}
.rv{white-space:nowrap;font-weight:500;font-size:12px;}
.neg{color:var(--red);}.pos{color:var(--green);}.yel{color:var(--accent);}
.gld{color:var(--gold);}.pur{color:var(--purple);}.blu{color:var(--blue);}.orn{color:var(--orange);}

.alert{padding:10px 11px;margin-bottom:9px;font-size:11px;line-height:1.7;display:flex;gap:8px;align-items:flex-start;}
.alert.danger{background:var(--red-dim);border:1px solid rgba(255,77,109,.25);}
.alert.warn{background:var(--gold-dim);border:1px solid rgba(255,200,71,.25);}
.alert.info{background:var(--blue-dim);border:1px solid rgba(71,184,255,.25);}
.alert.ok{background:var(--green-dim);border:1px solid rgba(71,255,170,.25);}
.ai{font-size:15px;flex-shrink:0;margin-top:1px;}
.ab strong{color:var(--text);}

/* ══ AHORA TAB ══ */
.ahora-hero{background:var(--s1);border:1px solid rgba(212,255,71,.25);padding:16px;margin-bottom:10px;text-align:center;}
.ahora-question{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.ahora-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.ahora-btn{padding:14px 10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;text-align:center;line-height:1.5;}
.ahora-btn:active{transform:scale(.97);}
.ahora-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
.ahora-btn .ab-icon{font-size:20px;display:block;margin-bottom:4px;}

.step-list{background:var(--s1);border:1px solid var(--border);overflow:hidden;margin-bottom:9px;}
.step-hdr{padding:10px 13px;background:var(--s2);border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);}
.step{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-bottom:1px solid rgba(37,37,64,.5);}
.step:last-child{border-bottom:none;}
.step-num{width:22px;height:22px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-num.done{background:var(--green-dim);color:var(--green);border:1px solid rgba(71,255,170,.4);}
.step-body{flex:1;}
.step-title{font-size:12px;color:var(--text);font-weight:500;margin-bottom:2px;}
.step-amount{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);margin-bottom:2px;}
.step-note{font-size:10px;color:var(--muted);line-height:1.5;}
.copy-btn{font-size:9px;padding:3px 8px;background:var(--s3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;margin-top:4px;display:inline-block;}
.copy-btn:active{color:var(--accent);border-color:var(--accent);}

/* ══ PRESUPUESTO ══ */
.wk-nav{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:2px;}
.wk-nav::-webkit-scrollbar{display:none;}
.wk-btn{flex-shrink:0;padding:7px 10px;border:1px solid var(--border);background:var(--s2);cursor:pointer;text-align:center;min-width:64px;transition:all .15s;}
.wk-btn.on{border-color:var(--accent);background:var(--accent-dim);}
.wk-btn.wcut{border-left:3px solid var(--orange);}
.wk-btn.wfull{border-left:3px solid var(--green);}
.wk-btn.wbonus{border-left:3px solid var(--gold);}
.wk-btn.wdone{opacity:.45;}
.wk-btn:active{transform:scale(.94);}
.wbn{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.wbdate{font-size:10px;font-weight:500;}
.wbinc{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;margin-top:2px;}

.budget-card{background:var(--s1);border:1px solid var(--border);overflow:hidden;margin-bottom:9px;}
.bc-header{padding:13px 13px 10px;border-bottom:1px solid var(--border);}
.bc-income{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.bc-section{padding:0 13px;}
.bc-sec-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:9px 0 5px;border-top:1px solid var(--border);margin-top:2px;display:flex;justify-content:space-between;}
.bc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(37,37,64,.4);gap:8px;}
.bc-row:last-child{border-bottom:none;}
.bc-left{display:flex;align-items:flex-start;gap:7px;flex:1;min-width:0;}
.bc-desc{font-size:12px;color:var(--text);line-height:1.4;}
.bc-note{font-size:10px;color:var(--muted);margin-top:1px;}
.bc-amount{font-size:13px;font-weight:600;white-space:nowrap;}
.bc-total{padding:11px 13px;background:var(--s2);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.bc-total-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);}
.bc-total-amount{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;}

.action-list{background:var(--s1);border:1px solid rgba(212,255,71,.2);padding:13px;margin-bottom:9px;}
.al-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:700;}
.al-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(37,37,64,.4);font-size:12px;line-height:1.5;cursor:pointer;}
.al-item:last-child{border-bottom:none;}
.al-num{color:var(--accent);font-weight:700;flex-shrink:0;min-width:18px;}
.al-text{color:var(--muted);flex:1;}
.al-text strong{color:var(--text);}
.al-item.done .al-text{color:var(--muted2);text-decoration:line-through;}
.al-item.done .al-num{color:var(--green);}

/* ══ GASTOS ══ */
.donut-rel{position:relative;width:84px;height:84px;flex-shrink:0;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.tx-group{margin-bottom:14px;}
.tx-ghdr{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;}
.tx{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(37,37,64,.5);}
.tx:last-child{border-bottom:none;}
.tx-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.tx-inf{flex:1;min-width:0;}
.tx-d{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-m{font-size:10px;color:var(--muted);margin-top:1px;}
.tx-a{font-size:12px;font-weight:500;white-space:nowrap;}
.tx-del{width:24px;height:24px;border:none;background:transparent;color:var(--muted2);font-size:15px;cursor:pointer;flex-shrink:0;}
.tx-del:active{color:var(--red);}

/* ══ DEUDAS ══ */
.dcard{background:var(--s1);border:1px solid var(--border);padding:12px 13px;margin-bottom:8px;}
.dcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.dcard-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.dpill{font-size:9px;padding:2px 8px;font-weight:600;}
.dpill.active{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,109,.3);}
.dpill.auto{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(71,184,255,.3);}
.dpill.done{background:var(--green-dim);color:var(--green);border:1px solid rgba(71,255,170,.3);}
.dprog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.dprog-fill{height:100%;border-radius:2px;transition:width .6s ease;}

/* MSI */
.msi-card{background:var(--s1);border:1px solid rgba(71,184,255,.2);padding:12px 13px;margin-bottom:8px;}
.msi-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
.msi-prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0;}
.msi-fill{height:100%;background:var(--blue);border-radius:2px;}

/* ══ WISHLIST ══ */
.wish-card{background:var(--s1);border:1px solid var(--border);padding:13px;margin-bottom:8px;position:relative;}
.wish-card.affordable{border-color:rgba(71,255,170,.3);}
.wish-card.soon{border-color:rgba(255,200,71,.3);}
.wish-card.later{border-color:rgba(37,37,64,.8);}
.wish-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px;}
.wish-price{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;}
.wish-status{font-size:9px;padding:3px 9px;font-weight:700;letter-spacing:.5px;display:inline-block;margin-top:6px;}
.wish-status.affordable{background:var(--green-dim);color:var(--green);border:1px solid rgba(71,255,170,.3);}
.wish-status.soon{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,200,71,.3);}
.wish-status.later{background:var(--s3);color:var(--muted);border:1px solid var(--border);}
.wish-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:transparent;color:var(--muted2);font-size:15px;cursor:pointer;}
.wish-del:active{color:var(--red);}

/* ══ SALUD ══ */
.rx-card{background:var(--s1);border:1px solid var(--border);padding:13px;margin-bottom:9px;}
.rx-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:8px;}
.rx-days{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.rx-label{font-size:10px;color:var(--muted);margin-top:3px;}
.rx-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0;}
.rx-fill{height:100%;border-radius:3px;transition:width .5s;}

/* Progress bars */
.bar-wrap{margin:8px 0;}
.bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;}
.bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width .5s;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(7,7,15,.94);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{width:100%;background:var(--s2);border:1px solid var(--border);border-bottom:none;padding:16px 13px 36px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
.overlay.on .modal{transform:translateY(0);}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mtitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.mcls{width:26px;height:26px;border:1px solid var(--border);background:var(--s3);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;}
.fg{margin-bottom:11px;}
.flbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.finp{width:100%;background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;padding:10px 11px;outline:none;-webkit-appearance:none;border-radius:0;}
.finp:focus{border-color:var(--accent);}
.finp.big{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;color:var(--accent);}
.finp::placeholder{color:var(--muted2);}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:11px;}
.tybtn{padding:10px;border:1px solid var(--border);background:var(--s3);color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
.tybtn.exp.on{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.tybtn.inc.on{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.catb{padding:8px 2px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;text-align:center;font-size:8px;font-family:'DM Mono',monospace;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;}
.catb .ce{font-size:15px;}
.catb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.save-btn{width:100%;padding:13px;background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:5px;}
.save-btn:active{opacity:.85;}

.fab{position:fixed;bottom:20px;right:13px;width:50px;height:50px;background:var(--accent);color:#000;border:none;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(212,255,71,.3);z-index:100;transition:transform .15s;}
.fab:active{transform:scale(.9);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--border2);padding:8px 13px;font-size:11px;z-index:300;opacity:0;transition:all .2s;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fin{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fin{animation:fin .2s ease both;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pulse{animation:pulse 2s infinite;}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Ivan<span>.</span></div>
      <div class="streak-badge" id="streak-display">🔥 0 sem</div>
    </div>
    <div class="topbar-right">
      <button class="tbtn primary" onclick="openModal('expense')">+</button>
    </div>
  </div>
  <div class="nav">
    <button class="navt on"  onclick="switchTab('ahora',this)">⚡ Ahora</button>
    <button class="navt"     onclick="switchTab('presup',this)">Plan</button>
    <button class="navt"     onclick="switchTab('gastos',this)">Gastos</button>
    <button class="navt"     onclick="switchTab('deudas',this)">Deudas</button>
    <button class="navt"     onclick="switchTab('wishlist',this)">Wishlist</button>
    <button class="navt"     onclick="switchTab('salud',this)">Salud</button>
  </div>
  <div class="scroll">
    <div id="tab-ahora"   class="view on"></div>
    <div id="tab-presup"  class="view"></div>
    <div id="tab-gastos"  class="view"></div>
    <div id="tab-deudas"  class="view"></div>
    <div id="tab-wishlist"class="view"></div>
    <div id="tab-salud"   class="view"></div>
  </div>
</div>

<button class="fab" onclick="openModal('expense')">+</button>

<div class="overlay" id="overlay" onclick="closeOut(event)">
  <div class="modal" id="modal">
    <div class="mhdr">
      <div class="mtitle" id="mtitle">Nuevo gasto</div>
      <div class="mcls" onclick="closeModal()">×</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── Storage keys ─────────────────────────────────────────────────────────
const SK='iv4_txs', DK='iv4_debts', CK='iv4_checks', WK='iv4_wish', RK='iv4_rx', STK='iv4_streak';

// ─── Categories ───────────────────────────────────────────────────────────
const CATS=[
  {id:'salary',e:'💰',l:'Nómina',  c:'#47ffaa'},
  {id:'bonus', e:'🎁',l:'Bono',    c:'#ffc847'},
  {id:'gas',   e:'⛽',l:'Gasolina',c:'#ff9f47'},
  {id:'food',  e:'🍔',l:'Comida',  c:'#ff6b47'},
  {id:'health',e:'💊',l:'Salud',   c:'#47b8ff'},
  {id:'debt',  e:'💳',l:'Deuda',   c:'#ff4d6d'},
  {id:'subs',  e:'📱',l:'Suscr.',  c:'#c084fc'},
  {id:'car',   e:'🚗',l:'Carro',   c:'#ff9f47'},
  {id:'med',   e:'🏥',l:'Médico',  c:'#47b8ff'},
  {id:'save',  e:'🏦',l:'Ahorro',  c:'#d4ff47'},
  {id:'wish',  e:'✨',l:'Wishlist', c:'#c084fc'},
  {id:'other', e:'📦',l:'Otro',    c:'#7777aa'},
];

// ─── Debts initial state ──────────────────────────────────────────────────
const DEBTS_INIT=[
  {id:'plata',  n:'Plata Card',    bal:468,   orig:2000,  st:'active',c:'#c084fc',note:'$468 mayo · vence 28 jun'},
  {id:'bbva',   n:'BBVA Azul',     bal:22000, orig:23673, st:'active',c:'#ff9f47',note:'Mín $1,711 · vence 2 jul'},

// ─── Helpers ───────────────────────────────────────────────────────────────
const fmt=n=>'$'+Math.abs(n).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD=n=>'$'+Math.abs(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
function fmtDate(d){const[y,m,day]=d.split('-');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${parseInt(day)} ${mn[parseInt(m)-1]}`;}
function weekOf(d){const dt=new Date(d+'T12:00');const dy=dt.getDay();const df=dt.getDate()-dy+(dy===0?-6:1);const mn=new Date(dt);mn.setDate(df);return mn.toISOString().substring(0,10);}
function wkLabel(w){const d=new Date(w+'T12:00');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${d.getDate()} ${mn[d.getMonth()]}`;}
function getPeriods(){const s=new Set();txs.forEach(t=>s.add(t.date.substring(0,7)));const n=new Date();s.add(`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`);return[...s].sort().reverse();}
function periodTxs(p){return txs.filter(t=>t.date.startsWith(p));}
function periodLabel(p){const[y,m]=p.split('-');const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${mn[parseInt(m)-1]} ${y}`;}
function cat(id){return CATS.find(c=>c.id===id)||{e:'📦',l:id,c:'#555'};}
function daysUntil(dateStr){const t=new Date(dateStr+'T12:00');const n=new Date();return Math.ceil((t-n)/(1000*60*60*24));}
function addDays(dateStr,days){const d=new Date(dateStr+'T12:00');d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];}

// ─── Streak ────────────────────────────────────────────────────────────────
function updateStreak(){
  document.getElementById('streak-display').textContent=`🔥 ${streakData.weeks} sem`;
}
function checkInStreak(){
  const today=new Date().toISOString().split('T')[0];
  const lastWeek=streakData.lastCheck?weekOf(streakData.lastCheck):'';
  const thisWeek=weekOf(today);
  if(thisWeek!==lastWeek){
    streakData.weeks++;
    streakData.lastCheck=today;
    save();updateStreak();
    toast(`🔥 ¡Racha de ${streakData.weeks} semanas!`);
  } else {
    toast('Ya registraste esta semana ✓');
  }
}

// ─── GASTOS ───────────────────────────────────────────────────────────────
function renderGastos(){
  const periods=getPeriods();
  const curP=curPeriod||periods[0]||'2026-06';
  const list=periodTxs(curP).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const income=list.filter(t=>t.type==='income').reduce((a,t)=>a+t.amt,0);
  const expense=list.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amt,0);
  const bal=income-expense;
  const pct=income>0?Math.min(100,Math.round(expense/income*100)):0;
  const r=36,circ=2*Math.PI*r;
  const rc=pct<60?'var(--green)':pct<85?'var(--gold)':'var(--red)';

  let h=`<div class="card fin">
    <div class="donut-row">
      <div class="donut-rel">
        <svg width="84" height="84" viewBox="0 0 84 84" style="transform:rotate(-90deg);">
          <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/>
          <circle cx="42" cy="42" r="${r}" fill="none" stroke="${rc}" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round"/>
        </svg>
        <div class="donut-center">
          <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:${rc};">${pct}%</div>

        </div>
      </div>
      <div style="flex:1;">
        <div class="row"><span class="rl">Ingresos</span><span class="rv pos">${fmt(income)}</span></div>
        <div class="row"><span class="rl">Gastos</span><span class="rv neg">${fmt(expense)}</span></div>
        <div class="row"><span class="rl">Balance</span><span class="rv" style="color:${bal>=0?'var(--green)':'var(--red)'};">${bal>=0?'+':''}${fmtD(bal)}</span></div>
      </div>
    </div>
  </div>`;

  h+=`<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;">`;

    h+=`<button onclick="switchPeriod('${p}')" style="flex-shrink:0;padding:5px 10px;border:1px solid var(--border);background:${p===curP?'var(--accent)':'var(--s2)'};color:${p===curP?'#000':'var(--muted)'};font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;">${periodLabel(p)}</button>`;

    h+=`<div style="text-align:center;padding:40px 0;color:var(--muted);"><div style="font-size:32px;margin-bottom:8px;opacity:.4;">💸</div>Sin registros · toca + para agregar</div>`;

    const byW={};
    list.forEach(t=>{const w=weekOf(t.date);if(!byW[w])byW[w]=[];byW[w].push(t);});
    Object.keys(byW).sort().reverse().forEach(w=>{
      const items=byW[w];
      const wBal=items.reduce((a,t)=>a+(t.type==='income'?t.amt:-t.amt),0);
      h+=`<div class="tx-group">
        <div class="tx-ghdr"><span>Sem ${wkLabel(w)}</span><span style="color:${wBal>=0?'var(--green)':'var(--red)'};">${wBal>=0?'+':''}${fmt(wBal)}</span></div>`;
      items.forEach(t=>{

function editDebt(id){
  const d=debts.find(x=>x.id===id);if(!d)return;
  const v=prompt(`Nuevo saldo de ${d.n}:\nActual: ${fmt(d.bal)}`,d.bal);

  if(isNaN(n)||n<0){toast('Monto inválido');return;}
  d.bal=n;if(n===0)d.st='done';
  save();renderDeudas();toast('Actualizado ✓');
}

// ─── WISHLIST ─────────────────────────────────────────────────────────────
function getWishStatus(price){
  // Current disposable after obligations ~$400/week
  const weeklyFree=400;
  const monthlyFree=weeklyFree*4.3;
  if(price<=weeklyFree*2)return{label:'Puedes comprarlo',cls:'affordable',color:'var(--green)',months:0};
  const months=Math.ceil(price/monthlyFree);
  if(months<=3)return{label:`En ~${months} mes${months>1?'es':''}`,cls:'soon',color:'var(--gold)',months};
  // Check against bonus dates
  if(price<=7000)return{label:'Con fondo ahorro ene 2027',cls:'later',color:'var(--muted)',months:8};
  return{label:'Post-deuda: ago 2027+',cls:'later',color:'var(--muted)',months:15};
}

          <div class="rx-days" style="color:${color};">${daysLeft<=0?'0':daysLeft}</div>
          <div class="rx-label">${daysLeft<=0?'Vencida':'días restantes'}</div>
        </div>
        <div style="flex:1;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">Vence: ${fmtDate(expDate)}</div>
          <div class="rx-bar"><div class="rx-fill" style="width:${pct}%;background:${color};"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${rx.note}</div>
        </div>
      </div>
      ${rx.controlled?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
        <div style="font-size:10px;color:var(--orange);">⚠️ Medicamento controlado — requiere receta firmada por psiquiatra</div>
        ${daysLeft<=7?`<button onclick="updateRxDate('${rx.id}')" style="margin-top:6px;padding:5px 10px;background:var(--accent);color:#000;border:none;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;">Renovar fecha de receta</button>`:''}
      </div>`:`
        <button onclick="updateRxDate('${rx.id}')" style="margin-top:8px;padding:5px 10px;background:var(--s3);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;">Actualizar fecha</button>
      `}
    </div>`;
  });

  // Medical appointments tracker
  h+=`<div class="card fin" style="margin-top:4px;">
    <div class="sec-lbl">Citas médicas pendientes</div>
    <div class="row"><span class="rl"><strong>Psiquiatra</strong><span class="sub">27 Jul 2026 · $1,500 · privado</span></span><span class="rv orn">~49 días</span></div>
    <div class="row"><span class="rl"><strong>Urólogo</strong><span class="sub">IMSS — $0 · agendar pronto</span></span><span class="rv neg">Pendiente</span></div>
    <div class="row"><span class="rl"><strong>Ortopedista</strong><span class="sub">IMSS — $0 · pendiente</span></span><span class="rv neg">Pendiente</span></div>
    <div class="row"><span class="rl"><strong>Dermatólogo</strong><span class="sub">IMSS — $0 · pendiente</span></span><span class="rv neg">Pendiente</span></div>
    <div class="row"><span class="rl"><strong>Dentista</strong><span class="sub">IMSS — $0 · pendiente</span></span><span class="rv neg">Pendiente</span></div>
  </div>`;

  h+=`<div class="alert warn fin">
    <div class="ai">⚠️</div>
    <div class="ab"><strong>Recuerda:</strong><br>
    La receta del Metilfenidato vence 30 días después de emitida. Agenda con el psiquiatra al menos 1 semana antes para no quedarte sin medicamento.</div>
  </div>`;

  document.getElementById('tab-salud').innerHTML=h;
}

function updateRxDate(id){
  const rx=rxList.find(r=>r.id===id);if(!rx)return;
  const today=new Date().toISOString().split('T')[0];
  rx.date=today;
  save();renderSalud();toast('Fecha de receta actualizada ✓');
}

// ─── Modal expense/income ──────────────────────────────────────────────────
function openModal(t){
  modalMode=t;
  curType=t;
  document.getElementById('mtitle').textContent=t==='income'?'Nuevo ingreso':'Nuevo gasto';
  document.getElementById('modal-body').innerHTML=`
    <div class="type-row">
      <button class="tybtn exp ${t==='expense'?'on':''}" id="btn-exp" onclick="setType('expense')">Gasto</button>
      <button class="tybtn inc ${t==='income'?'on':''}" id="btn-inc" onclick="setType('income')">Ingreso</button>
    </div>
    <div class="fg"><label class="flbl">Monto</label><input class="finp big" id="inp-amt" type="number" inputmode="decimal" placeholder="0"></div>
    <div class="fg"><label class="flbl">Descripción</label><input class="finp" id="inp-desc" type="text" placeholder="¿Qué fue?" maxlength="60"></div>
    <div class="fg"><label class="flbl">Categoría</label><div class="cat-grid" id="cat-grid"></div></div>
    <div class="fg"><label class="flbl">Fecha</label><input class="finp" id="inp-date" type="date"></div>
    <button class="save-btn" onclick="saveTx()">Guardar</button>
  `;
  document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
  curCat=t==='income'?'salary':'other';
  renderCats();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>{const a=document.getElementById('inp-amt');if(a)a.focus();},300);
}

function closeModal(){document.getElementById('overlay').classList.remove('on');}
function closeOut(e){if(e.target===document.getElementById('overlay'))closeModal();}

function setType(t){
  curType=t;
  const be=document.getElementById('btn-exp'),bi=document.getElementById('btn-inc');
  if(be)be.classList.toggle('on',t==='expense');
  if(bi)bi.classList.toggle('on',t==='income');
  document.getElementById('mtitle').textContent=t==='income'?'Nuevo ingreso':'Nuevo gasto';
  if(t==='income')curCat='salary';
  else if(['salary','bonus'].includes(curCat))curCat='other';
  renderCats();
}

function renderCats(){
  const cg=document.getElementById('cat-grid');if(!cg)return;
  const cs=curType==='income'?CATS.filter(c=>['salary','bonus','save','other'].includes(c.id)):CATS.filter(c=>!['salary','bonus'].includes(c.id));
  cg.innerHTML=cs.map(c=>`<div class="catb ${c.id===curCat?'on':''}" onclick="selCat('${c.id}')"><span class="ce">${c.e}</span><span>${c.l}</span></div>`).join('');
}

function selCat(id){curCat=id;renderCats();}

function saveTx(){
  const amt=parseFloat(document.getElementById('inp-amt').value);
  const desc=document.getElementById('inp-desc').value.trim()||'Sin descripción';
  const date=document.getElementById('inp-date').value;
  if(!amt||amt<=0){toast('Ingresa un monto');return;}
  if(!date){toast('Selecciona fecha');return;}
  txs.push({id:Date.now().toString(),type:curType,amt,desc,cat:curCat,date});
  save();closeModal();render();toast(curType==='income'?'Ingreso guardado ✓':'Gasto guardado ✓');
}

function delTx(id){txs=txs.filter(t=>t.id!==id);save();render();toast('Eliminado');}

// ─── Tabs ─────────────────────────────────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.navt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=tab;
  ['ahora','presup','gastos','deudas','wishlist','salud'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('on',t===tab);
  });
  render();
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2200);
}

function render(){
  if(curTab==='ahora')renderAhora();
  else if(curTab==='presup')renderPresup();
  else if(curTab==='gastos')renderGastos();
  else if(curTab==='deudas')renderDeudas();
  else if(curTab==='wishlist')renderWishlist();
  else if(curTab==='salud')renderSalud();
}

load();selWk=1;render();
</script>
</body>
</html>
